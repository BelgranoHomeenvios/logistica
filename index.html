<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logística · Belgrano Home (DEMO v3)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2316324f'/><text x='50' y='66' text-anchor='middle' font-size='44' font-weight='700' fill='white' font-family='sans-serif'>BH</text></svg>" />
<style>
:root{--navy:#16324f;--ink:#0f1a2a;--blue:#1e5fce;--blue-d:#1a51b0;--muted:#8a94a3;--sec:#5b6675;--line:#d9e0e8;--line2:#eef1f5;--bg:#f4f6f8;--card:#fff;--green:#15803d;--red:#b42318;--amber:#b45309;--shadow:0 1px 2px rgba(15,26,42,.06),0 1px 3px rgba(15,26,42,.04)}
*{box-sizing:border-box}
body{margin:0;font-family:'Public Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.demobar{background:#fff;color:#5b6675;font-size:12.5px;font-weight:600;padding:7px 28px;text-align:left;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.demobar select{font:inherit;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:var(--navy)}
.app-header{background:var(--navy);color:#fff;height:56px;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
.app-header .brand{display:flex;align-items:center;gap:12px}
/* Selector de módulos Belgrano Soft — mismo bloque que el CRM, para que la barra
   se vea igual en las dos apps y se pueda saltar de una a la otra sin salir. */
.mod-switch{display:flex;gap:6px;margin-left:14px}
.mod-switch-item{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.7);text-decoration:none;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.08)}
.mod-switch-item:hover{background:rgba(255,255,255,.16);color:#fff}
.mod-switch-active{background:rgba(255,255,255,.22);color:#fff}
@media(max-width:560px){.mod-switch{margin-left:8px;gap:4px}.mod-switch-item{padding:4px 9px;font-size:11.5px}}
.app-header .logo{width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
.app-header .title{font-weight:700;font-size:15px;letter-spacing:-.01em}
.app-header .user{display:flex;align-items:center;gap:12px}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;font:inherit;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer}
.btn-logout:hover{background:rgba(255,255,255,.28)}
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#eef1f5;padding:20px}
.login-card{background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(15,26,42,.12);padding:36px 34px;width:100%;max-width:380px;text-align:center}
.login-logo{width:52px;height:52px;background:var(--navy);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;margin:0 auto 16px}
.login-card h1{font-size:19px;color:var(--navy);margin:0 0 4px}
.login-sub{color:#5b6675;font-size:13.5px;margin:0 0 22px}
.login-lbl{display:block;text-align:left;font-size:12.5px;font-weight:700;color:#3a4453;margin:12px 0 5px}
.login-card input{width:100%;height:44px;padding:0 12px;border:1px solid #d0d7e2;border-radius:9px;font:inherit;font-size:15px;box-sizing:border-box}
.login-card input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(22,50,79,.1)}
.login-btn{width:100%;height:46px;margin-top:20px;background:var(--navy);color:#fff;border:none;border-radius:9px;font:inherit;font-size:15px;font-weight:700;cursor:pointer}
.login-btn:hover{background:#1e3f5f}
.login-btn:disabled{opacity:.7;cursor:default}
.login-err{background:#fdecea;color:#b42318;font-size:13px;border-radius:8px;padding:9px 12px;margin-bottom:8px;text-align:left}
.login-foot{color:#8a94a3;font-size:12px;margin:18px 0 0}
.btn-cargar-viaje{display:inline-flex;align-items:center;gap:6px;background:#2563eb;color:#fff;border:none;font:inherit;font-size:13.5px;font-weight:600;padding:8px 15px;border-radius:8px;cursor:pointer;white-space:nowrap}
.btn-cargar-viaje:hover{background:#1d4fc4}
.btn-cargar-viaje:active{transform:scale(.97)}
.app-header .user span{font-size:13px;color:rgba(255,255,255,.75)}
.app-header .avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.tabs{background:#fff;border-bottom:1px solid var(--line);padding:0 28px;display:flex;gap:2px;overflow-x:auto}
.tabs a{padding:13px 16px;font-size:13.5px;font-weight:600;color:var(--sec);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none}
.tabs a.active{color:var(--navy);font-weight:700;border-bottom-color:var(--blue)}
.container{max-width:1120px;margin:0 auto;padding:22px 28px 64px}
.card{background:var(--card);border:1px solid #e6eaef;border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{margin:0 0 6px;font-size:18px;font-weight:800;color:var(--navy)}.card h3{margin:0 0 8px;font-size:14px;font-weight:700;color:var(--navy)}
.grid-stats{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
.stat{border:1px solid #e6eaef;border-radius:10px;padding:12px 14px}
.stat .value{font-size:24px;font-weight:800;color:var(--navy)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
label.field{display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:600;color:#2a3648;justify-content:flex-end}
label.field .lbl{min-height:17px;display:flex;align-items:center;gap:5px}
label.field .hint{font-weight:400;color:var(--muted);font-size:11px}
input,select{font:inherit;height:42px;padding:0 12px;border:1px solid #d0d7e2;border-radius:8px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus{outline:2px solid rgba(30,95,206,.15);border-color:var(--blue)}
input[readonly]{background:#f7f9fb;color:#5b6675}
input.inval,select.inval{border-color:var(--red);background:#fef3f2}
.inline2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dom3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
@media(max-width:600px){.dom3{grid-template-columns:1fr}}
.sub-h{font-size:11.5px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 8px}
.btn{font:inherit;font-weight:700;cursor:pointer;border-radius:6px;padding:9px 15px;border:1px solid transparent;font-size:13.5px}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-d)}
.btn-ghost{background:#fff;border-color:#d0d7e2;color:#2a3648}.btn-ghost:hover{background:#f7f9fb}
.btn-ok{background:var(--green);color:#fff}.btn-danger{background:#fff;border-color:#f3c0bb;color:var(--red)}
.btn-sm{padding:6px 11px;font-size:12.5px}
.costo-tabla{max-width:460px;margin-top:8px}
.costo-tabla table{width:100%;border-collapse:separate;border-spacing:0}
.costo-tabla .ct-head td{font-size:11.5px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;padding:0 14px 8px 0}
.costo-tabla td{padding:8px 14px 8px 0;font-size:14px;border-top:1px solid var(--line2);vertical-align:middle}
.costo-tabla .ct-head td{border-top:none;padding-top:0}
.ct-lbl{font-weight:600;color:#2a3648;white-space:nowrap;width:1%}
.ct-monto{width:120px}
.ct-monto input{width:100%;text-align:right}
.ct-est{width:150px;padding-right:0!important}
.ct-est select{width:100%}
.ct-nota{font-size:12.5px;color:var(--blue-d);padding:0 0 10px 0!important;border-top:none!important}
.rowacc{position:relative;display:inline-flex;gap:6px;align-items:center}
.icon-btn{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:15px;line-height:1}
.icon-btn.btn-ghost{color:#5b6675}
.icon-btn-xs{width:22px;height:22px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:12px;line-height:1;vertical-align:middle;border-radius:5px}
.cmt-ico{cursor:help;font-size:13px;vertical-align:middle}
.rd-diff{color:#b45309}
.ord-actions{position:relative;display:flex;gap:6px;justify-content:flex-end;align-items:center}
.ord-menu{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(15,26,42,.18);min-width:220px;z-index:200;padding:4px;text-align:left}
.mueble-pop{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(15,26,42,.18);min-width:230px;max-width:320px;z-index:200;padding:10px 14px;text-align:left}
.mueble-pop .mp-title{font-size:11px;font-weight:700;color:var(--sec);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;border-bottom:1px solid var(--line2);padding-bottom:6px}
.mueble-pop .mp-row{font-size:13px;color:#2a3648;padding:3px 0;white-space:nowrap}
.cupototal{font-size:15px;font-weight:800;color:var(--blue);background:#eaf1fc;border-radius:6px;padding:2px 9px;margin-left:6px;vertical-align:middle}
.modal-overlay{position:fixed;inset:0;background:rgba(15,26,42,.5);display:flex;align-items:center;justify-content:center;z-index:900;padding:16px}
.mapa-overlay{position:fixed;inset:0;background:rgba(15,26,42,.5);display:flex;align-items:center;justify-content:center;z-index:900;padding:16px}
.mapa-card{background:#fff;border-radius:12px;padding:18px 20px;width:100%;max-width:900px;box-shadow:0 20px 60px rgba(15,26,42,.3)}
.mapa-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mapchips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 10px}
.mapchip{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:12.5px;padding:5px 11px;border-radius:20px;border:1px solid #d0d7e2;background:#fff;cursor:pointer;color:#2a3648}
.mapchip:hover{background:#eef1f5}
.mapchip.on{background:#16324f;color:#fff;border-color:#16324f}
.mapchip b{font-weight:700}
.mapchip-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mapa-head h3{margin:0;color:var(--navy)}
.modal-card{background:#fff;border-radius:16px;padding:24px 26px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(15,26,42,.35);max-height:90vh;overflow-y:auto}
.modal-card h3{margin:0 0 4px;color:var(--navy);font-size:18px}
.modal-card .modal-sub{color:var(--sec);font-size:13px;margin-bottom:16px}
.modal-card label{display:block;font-size:12.5px;font-weight:700;color:#2a3648;margin:12px 0 5px}
.modal-card select,.modal-card input[type=text],.modal-card input[type=date],.modal-card textarea{width:100%;border:1px solid #d0d7e2;border-radius:8px;padding:9px 11px;font:inherit;font-size:14px}
.modal-card textarea{min-height:60px;resize:vertical}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.imprsem-row{display:flex;align-items:center;gap:9px;padding:7px 2px;font-size:14.5px;cursor:pointer}
.imprsem-row input{width:17px;height:17px;cursor:pointer}
.imprsem-todos{font-weight:700;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:4px}
.imprsem-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px}
.modal-saldo{background:#f4f6f8;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;font-size:14px;margin-top:4px}
.modal-saldo b{font-size:17px;color:var(--navy)}
.modal-diff{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:700;text-align:center}
.modal-diff.ok{background:#e7f5ec;color:#15803d}
.modal-diff.falta{background:#fdecea;color:#b42318}
.field-error{border-color:#b42318 !important;background:#fdecea}
.field-error-msg{color:#b42318;font-size:12px;font-weight:600;margin:-6px 0 8px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:950;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(15,26,42,.22);max-width:min(520px,90vw);text-align:center}
.toast-error{background:#fdecea;color:#b42318;border:1px solid #f3c0bb}
.toast-info{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe}
.toast-success{background:#e7f5ec;color:#0f5132;border:1px solid #bfe3cd}
.modal-diff.demas{background:#fff7e6;color:#b45309}
.ord-menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;padding:8px 10px;border-radius:6px;font-size:13px;font-weight:600;color:#2a3648;cursor:pointer;white-space:nowrap}
.ord-menu button:hover{background:#f4f6f8}
.ord-menu button.danger{color:var(--red)}
.ord-menu .ic{width:18px;text-align:center;flex-shrink:0}
.row-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.wiz-nav{display:flex;justify-content:space-between;gap:10px;margin-top:18px;border-top:1px solid var(--line2);padding-top:14px}
.steps{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 18px}
.step-pill{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer}
.step-pill .num{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--line);color:#fff;align-items:center;justify-content:center;font-size:12px}
.step-pill.done{color:var(--navy);border-color:#cfe0d6}.step-pill.done .num{background:var(--green)}
.step-pill.active{color:#fff;background:var(--blue);border-color:var(--blue)}.step-pill.active .num{background:rgba(255,255,255,.3)}
.mueble-row{display:grid;grid-template-columns:70px 1fr 130px 100px 40px;gap:8px;align-items:end;margin-bottom:8px}
.mflag{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--sec);cursor:pointer;height:42px;white-space:nowrap}
.mflag input{width:15px;height:15px;flex:none;margin:0;cursor:pointer}
.pago-row{display:grid;grid-template-columns:120px 1fr 40px;gap:8px;align-items:end;margin-bottom:8px}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:6px 16px;text-align:left;border-bottom:1px solid var(--line2);vertical-align:middle}
.thsort{cursor:pointer;user-select:none}
.thsort:hover{color:var(--navy)}
.mattable{min-width:640px}
.mattable th,.mattable td{padding:9px 12px;font-size:13px;text-align:center}
.mattable th:first-child,.mattable td:first-child{text-align:left;font-weight:700;white-space:nowrap}
.matrow-total td{background:#f7f9fb;font-weight:700}
.matcell.clik{cursor:pointer}
.matcell.clik:hover{background:#f0f3f7}
.matcell.matok{background:#e7f5ec;color:#15803d}
.matcell.matfull-ok{background:#e7f5ec;color:#15803d;font-weight:700}
.matcell.matover{background:#fdecea;color:#b42318;font-weight:700}
.matreclamo{color:#b42318;font-weight:700}
th{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.05em;white-space:nowrap}
td{color:#2a3648}
tbody tr:hover{background:#f7f9fb}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.e-completar{background:#eef1f5;color:#5b6675}.e-pend{background:#fff7e6;color:#b45309}.e-viaje{background:#e7effc;color:#1e5fce}
.e-entreg{background:#e7f5ec;color:#15803d}.e-reclamo{background:#fdecea;color:#b42318}.e-repro{background:#f2ecfb;color:#6b34c9}.e-canc{background:#eef1f5;color:#8a94a3}
.muted{color:var(--muted);font-size:13px}.empty{text-align:center;color:var(--muted);padding:36px}
.section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.flete-card{border:1px solid #e6eaef;border-radius:12px;padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.flete-card h3{margin:0 0 5px;font-size:16.5px;color:var(--navy)}
.flete-card ul{font-size:14px;line-height:1.7;margin:9px 0 0;padding-left:18px}
.flete-card .row-actions{gap:8px;margin-top:11px}
.flete-card .row-actions>.btn{flex:1;justify-content:center;min-height:42px;font-size:13px}
.flete-card .row-actions>.btn-wa{flex:0 0 52px;font-size:17px;line-height:1;background:#e7f5ec;border-color:#bfe3cc;text-decoration:none}
.flete-card .cobro-big{margin-top:9px;font-size:15px;font-weight:800;color:var(--navy)}
.saldo-box,.saldo-big{background:#f7f9fb;border:1px solid var(--line);border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:800;color:var(--navy);margin-top:8px}
.saldo-big{font-size:22px;padding:14px 18px;margin-top:14px}
.zona-auto{background:#e7effc;color:var(--blue);border-radius:8px;padding:0 12px;height:42px;display:flex;align-items:center;font-weight:700}
.cuadra{border-radius:8px;padding:7px 12px;font-weight:700;font-size:13px;display:inline-block;margin:6px 0}
.cuadra.ok{background:#e7f5ec;color:#15803d}.cuadra.no{background:#fdecea;color:#b42318}
.missing{background:#fdecea;border:1px solid #f3c0bb;color:#b42318;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;margin-bottom:12px}
.notinc{background:#fff7e6;border:1px solid #f2d9a8;color:#b45309;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-top:8px}
.dom2{display:grid;grid-template-columns:2fr 1fr;gap:8px}
@media(max-width:600px){.dom2{grid-template-columns:1fr}}
.frow{display:grid;grid-template-columns:220px 1fr;gap:12px;align-items:center;margin-bottom:10px}
.frl{font-size:13px;font-weight:600;color:#2a3648}
.frl .hint{font-weight:400;color:var(--muted);font-size:11px}
.pgin{display:grid;grid-template-columns:1fr auto;gap:8px}
@media(max-width:600px){.frow{grid-template-columns:1fr;gap:5px}}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:8px;background:#f4f6f8;border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 13px;font-size:13px;font-weight:600;color:#2a3648}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.ordbtn{border:none;background:none;color:#8a94a3;cursor:pointer;font-size:11px;padding:2px;line-height:1}
.ordbtn:hover{color:var(--navy)}
.chip button{border:none;background:#e2e8f0;color:#5b6675;width:20px;height:20px;border-radius:50%;cursor:pointer;font-weight:700;line-height:1}
.addrow{display:flex;gap:8px;max-width:380px}
.ordfilters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.ordfilters input,.ordfilters select{max-width:230px;height:40px}.fletesel{height:36px;padding:0 8px;min-width:135px;border:1px solid #d0d7e2;border-radius:8px;background:#fff}.e-asignar{background:#fdecea;color:#b42318}
.daynav{display:inline-flex;align-items:center;gap:8px;margin:0 0 12px}
.daynav input[type=date]{height:36px;width:170px;padding:0 10px;border:1px solid #d0d7e2;border-radius:8px;font:inherit}
.pagorow{margin-bottom:8px}.pagorow.del{display:grid;grid-template-columns:1fr auto;gap:8px}
.daytabs{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 12px;align-items:stretch}
.weeknav{flex:0 0 auto;width:34px;border:1px solid var(--navy);background:#fff;color:var(--navy);border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.weeknav:hover{background:var(--navy);color:#fff}

    const ids=[..._sbCola]; _sbCola.clear();
    const filas=ids.map(id=>{const o=ordenes.find(x=>x.id===id); return o?{id:o.id,data:o}:null}).filter(Boolean);
    if(!filas.length) return;
    try{
      const {error}=await sb.from('ordenes').upsert(filas,{onConflict:'id'});
      if(error){ console.error('Supabase upsert',error); showToast('No se pudo guardar en la nube (reintentá).','error',6000); ids.forEach(id=>_sbCola.add(id)); }
    }catch(e){ console.error(e); ids.forEach(id=>_sbCola.add(id)); }
  },400);
}

/* Carga inicial: trae todas las órdenes desde la base y reemplaza el array local. */
async function sbCargarInicial(){
  if(!sb){ pintarEstadoNube('sin conexión'); return; }
  pintarEstadoNube('cargando…');
  try{
    let todas=[], desde=0, tam=1000;
    while(true){
      const {data,error}=await sb.from('ordenes').select('data').range(desde,desde+tam-1);
      if(error){ throw error; }
      todas=todas.concat(data.map(r=>r.data));
      if(data.length<tam) break;
      desde+=tam;
    }
    _sbSuspender=true;
    ordenes.length=0;
    todas.forEach(o=>ordenes.push(o));
    _sbSnap={}; ordenes.forEach(o=>_sbSnap[o.id]=_sbJson(o));
    /* nid arranca por encima del id más alto usado, para no chocar */
    const maxId=ordenes.reduce((m,o)=>Math.max(m,+o.id||0),12);
    id=maxId+1;
    _sbSuspender=false; sbListo=true;
    pintarEstadoNube('ok');
    render();
    sbSuscribirRealtime();
    sbCargarConfig();
    sbSuscribirConfigRealtime();
  }catch(e){
    console.error('Carga inicial Supabase',e);
    sbError='No se pudieron cargar los datos de la nube';
    pintarEstadoNube('error');
  }
}

/* Realtime: cuando otro usuario cambia algo, lo reflejamos sin recargar. */
function sbSuscribirRealtime(){
  if(!sb) return;
  sb.channel('ordenes-cambios')
    .on('postgres_changes',{event:'*',schema:'public',table:'ordenes'},payload=>{
      _sbSuspender=true;
      if(payload.eventType==='DELETE'){
        const idx=ordenes.findIndex(o=>o.id===payload.old.id);
        if(idx>-1) ordenes.splice(idx,1);
        delete _sbSnap[payload.old.id];
      }else{
        const nueva=payload.new.data;
        const idx=ordenes.findIndex(o=>o.id===nueva.id);
        if(idx>-1) ordenes[idx]=nueva; else ordenes.push(nueva);
        _sbSnap[nueva.id]=_sbJson(nueva);
      }
      _sbSuspender=false;
      render();
    })
    .subscribe();
}

let _cfgSuspender=false;
async function sbCargarConfig(){
  if(!sb) return;
  try{
    const {data,error}=await sb.from('configuracion').select('data').eq('id',1).maybeSingle();
    if(error) throw error;
    if(data&&data.data){
      const c=data.data;
      if(Array.isArray(c.tipos)&&c.tipos.length) TIPOS=c.tipos;
      if(Array.isArray(c.fletes)&&c.fletes.length) FLETES=c.fletes;
      if(Array.isArray(c.locales)&&c.locales.length) LOCALES=c.locales;
      if(typeof c.escalera_def==='number') ESCALERA_DEF=c.escalera_def;
    }else{
      await sbGuardarConfig(); // primera vez: no hay fila, sembramos con los valores por defecto
    }
  }catch(e){ console.error('cargar configuración',e); showToast('No se pudo cargar la configuración de la nube.','error',6000); }
  if(tab==='config') vConfig();
}
let _cfgFlushTimer=null;
function sbGuardarConfig(){
  if(!sb) return;
  clearTimeout(_cfgFlushTimer);
  return new Promise(res=>{
    _cfgFlushTimer=setTimeout(async ()=>{
      _cfgSuspender=true;
      try{
        const {error}=await sb.from('configuracion').upsert({id:1,data:{tipos:TIPOS,fletes:FLETES,locales:LOCALES,escalera_def:ESCALERA_DEF}},{onConflict:'id'});
        if(error){ console.error('guardar configuración',error); showToast('No se pudo guardar la configuración en la nube (reintentá).','error',6000); }
      }catch(e){ console.error(e); showToast('No se pudo guardar la configuración en la nube (reintentá).','error',6000); }
      setTimeout(()=>{_cfgSuspender=false},400);
      res();
    },350);
  });
}
/* Realtime: si otro usuario (ej. Lucas desde su celular) cambia la config, se refleja acá sin recargar. */
function sbSuscribirConfigRealtime(){
  if(!sb) return;
  sb.channel('configuracion-cambios')
    .on('postgres_changes',{event:'*',schema:'public',table:'configuracion'},payload=>{
      if(_cfgSuspender) return;
      const c=payload.new&&payload.new.data; if(!c) return;
      if(Array.isArray(c.tipos)) TIPOS=c.tipos;
      if(Array.isArray(c.fletes)) FLETES=c.fletes;
      if(Array.isArray(c.locales)) LOCALES=c.locales;
      if(typeof c.escalera_def==='number') ESCALERA_DEF=c.escalera_def;
      if(tab==='config') vConfig(); else render();
    })
    .subscribe();
}

function parseCSV(text){const rows=[];let i=0,field='',row=[],inq=false;text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');

    if(inq){if(c==='"'){if(text[i+1]==='"'){field+='"';i++}else inq=false}else field+=c}
    else{if(c==='"')inq=true;else if(c===';'){row.push(field);field=''}else if(c==='\n'){row.push(field);rows.push(row);row=[];field=''}else field+=c}

  return rows}

function addYearsISO(iso,n){const p=iso.split('-').map(Number);const y=p[0]+n,m=p[1];const maxDay=new Date(y,m,0).getDate();const d=Math.min(p[2],maxDay);return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')}

function metricasPeriodo(desde,hasta){
  const ents=ordenes.filter(o=>esEntregada(o)&&!o.archivada&&enRango(o,desde,hasta));

let draft=null;

function draftFromOrden(o){const hd=horaDef(o.tipo);let hD=hd[0],hH=hd[1];if(o.horario){const mm=String(o.horario).match(/(\d+)\D+(\d+)/);if(mm){hD=mm[1];hH=mm[2]}}return {paso:1,boleta:o.boleta,fecha:o.fecha,tipo:o.tipo,horaDesde:hD,horaHasta:hH,confirmacion:o.confirmacion||'Confirmada',cliente:o.cliente,tel1:o.tel1||'',tel2:o.tel2||'',localidad:o.localidad,domicilio:o.direccion,pisodepto:o.pisodepto||'',retiroLocal:retLoc(o),localDestino:o.localDestino||'2299',expresoModo:o.expresoModo||'flete',transNombre:o.transNombre||'',transTel:o.transTel||'',transDom:o.transDom||'',provincia:o.provincia||'',dniCuit:o.dniCuit||'',bultos:o.bultos||1,valorDeclarado:o.valorDeclarado||0,embalaje:o.embalaje||0,cantMuebles:sum(o.lineas.map(l=>l.cant)),lineas:o.lineas.map(l=>({...l})),total:o.tipo==='Expreso'?(o.compra!=null?o.compra:((o.total||0)-(o.embalaje||0)-(o.costo_flete||0))):o.total,pagosList:o.pagosList||[o.pagos],costo_flete:o.costo_flete,instalacion:o.instalacion,escalera:o.escalera,costo_flete_estado:o.costo_flete_estado||'cobrar',instalacion_estado:o.instalacion_estado||'cobrar',escalera_estado:o.escalera_estado||'cobrar',comentario:o.comentario||'',observaciones:o.observaciones||''}}

function readStep(){const p=draft.paso;
  if(p===1){if($('w_bol'))draft.boleta=$('w_bol').value.trim();if($('w_fec'))draft.fecha=$('w_fec').value;if($('w_tipo'))draft.tipo=$('w_tipo').value;if($('w_hd'))draft.horaDesde=$('w_hd').value.trim();if($('w_hh'))draft.horaHasta=$('w_hh').value.trim();if($('w_comentario'))draft.comentario=$('w_comentario').value.trim();if($('w_observ'))draft.observaciones=$('w_observ').value.trim().slice(0,50)}
  if(p===2){if($('w_cli'))draft.cliente=$('w_cli').value.trim();if($('w_t1'))draft.tel1=$('w_t1').value.trim();if($('w_t2'))draft.tel2=$('w_t2').value.trim();if($('w_loc'))draft.localidad=$('w_loc').value.trim();if($('w_dom'))draft.domicilio=$('w_dom').value.trim();if($('w_pisodepto'))draft.pisodepto=$('w_pisodepto').value.trim();if($('w_ret'))draft.retiroLocal=$('w_ret').value;if($('w_dest'))draft.localDestino=$('w_dest').value;if($('w_emodo'))draft.expresoModo=$('w_emodo').value;if($('w_tn'))draft.transNombre=$('w_tn').value.trim();if($('w_tt'))draft.transTel=$('w_tt').value.trim();if($('w_tdom'))draft.transDom=$('w_tdom').value.trim();if($('w_prov'))draft.provincia=$('w_prov').value.trim();if($('w_dni'))draft.dniCuit=$('w_dni').value.trim()}

function faltan(){const p=draft.paso;const m=[];const k=[];const t=draft.tipo;
  if(p===1){if(!draft.boleta){m.push('N° de orden');k.push('boleta')}if(!draft.fecha){m.push('Día de entrega');k.push('fecha')}if(!draft.tipo){m.push('Tipo de envío');k.push('tipo')}if(!draft.horaDesde||!draft.horaHasta){m.push('Horario');k.push('hora')}}
  if(p===2){if(t==='Movimiento Interno'){if(!draft.localDestino){m.push('Local de destino');k.push('dest')}}else if(t==='Retiro'){if(!draft.cliente){m.push('Nombre del cliente');k.push('cliente')}if(!draft.tel1){m.push('Teléfono 1');k.push('tel1')}}else{if(!draft.cliente){m.push('Nombre del cliente');k.push('cliente')}if(!draft.tel1){m.push('Teléfono 1');k.push('tel1')}if(t==='Expreso'){if(!draft.transNombre){m.push('Nombre del transporte');k.push('tn')}if(!draft.provincia){m.push('Provincia');k.push('prov')}if(!draft.dniCuit){m.push('DNI / CUIT');k.push('dni')}if(!draft.localidad){m.push('Localidad');k.push('localidad')}}else if(!draft.domicilio){m.push('Domicilio');k.push('domicilio')}if(!draft.localidad){m.push('Localidad');k.push('localidad')}}}
  if(p===3){const s=sum(draft.lineas.map(l=>l.cant));if(!draft.cantMuebles){m.push('Cantidad de muebles');k.push('cantMuebles')}if(draft.lineas.some(l=>!l.desc)){m.push('Descripción de cada mueble');k.push('desc')}if(draft.cantMuebles&&s!==+draft.cantMuebles){m.push('Las cantidades suman '+s+' y tienen que dar '+draft.cantMuebles);k.push('cuadra')}}
  return {m,k}}
function invc(key){return draft._inval&&draft._inval.includes(key)?' inval':''}
function goStep(p){readStep();if(p>draft.paso){const f=faltan();if(f.k.length){draft._inval=f.k;vCargar();return}}
  if(p===4&&draft.paso!==4&&esVendedor()){if(!confirm('¿Seguro que querés cargar la parte del saldo?\n\nNormalmente esto lo completa Lucas o administración, para evitar errores de carga.'))return}
  draft._inval=[];draft.paso=p;vCargar()}
function setTipo(v){readStep();draft.tipo=v;const hd=horaDef(v);draft.horaDesde=hd[0];draft.horaHasta=hd[1];vCargar()}
function setConfirm(v){readStep();draft.confirmacion=v;vCargar()}

    <label class="field"><span class="lbl">N° de orden</span><input id="w_bol" class="${invc('boleta').trim()}" value="${esc(draft.boleta)}"></label>

    <div class="sub-h" style="margin-top:20px">Comentario interno <span class="hint">(solo lo ve el flete — NO se imprime, no lo ve el cliente)</span></div><textarea id="w_comentario" placeholder="Ej: llamar antes de salir, llevar sierra copa, el cliente pide agujero pasacables…" style="width:100%;min-height:52px;border:1px solid #d0d7e2;border-radius:8px;padding:9px 11px;font:inherit;resize:vertical">${esc(draft.comentario)}</textarea>
    <div class="sub-h" style="margin-top:12px">Comentario para el cliente <span class="hint">(sale impreso en el remito — máx. 50 caracteres)</span></div><input id="w_observ" maxlength="50" value="${esc(draft.observaciones||'')}" placeholder="Ej: revisar antes de firmar, entrega parcial…" style="width:100%;border:1px solid #d0d7e2;border-radius:8px;padding:9px 11px;font:inherit" oninput="if(this.value.length>50)this.value=this.value.slice(0,50)">`;

  const zona=esRetiro?'Retiro':(esMI?'Mov. interno':(esExp?'Expreso':zonaDraft()));
  const reg={boleta:draft.boleta,fecha:draft.fecha,tipo:t,confirmacion:draft.confirmacion||'Confirmada',horario,cliente:draft.cliente,tel1:draft.tel1,tel2:draft.tel2,localidad:(esRetiro||esMI)?'':draft.localidad,provincia:esExp?draft.provincia:'',zona,direccion,pisodepto:draft.pisodepto,retiroLocal:(esRetiro||(esExp&&draft.expresoModo==='retira'))?draft.retiroLocal:'',localDestino:esMI?draft.localDestino:'',expresoModo:esExp?draft.expresoModo:'',transNombre:esExp?draft.transNombre:'',transTel:esExp?draft.transTel:'',transDom:esExp?draft.transDom:'',dniCuit:esExp?draft.dniCuit:'',bultos:esExp?draft.bultos:0,valorDeclarado:esExp?draft.valorDeclarado:0,lineas:draft.lineas.filter(m=>m.desc),total:(parcial||esMI)?0:draft.total,pagosList:parcial?[]:draft.pagosList,pagos:(parcial||esMI)?0:sum(draft.pagosList),costo_flete:(parcial||esRetiro||esMI)?0:draft.costo_flete,embalaje:(parcial||!esExp)?0:draft.embalaje,instalacion:(parcial||esRetiro||esMI||esExp)?0:draft.instalacion,escalera:(parcial||esRetiro||esMI||esExp)?0:draft.escalera,costo_flete_estado:draft.costo_flete_estado||'cobrar',instalacion_estado:draft.instalacion_estado||'cobrar',escalera_estado:draft.escalera_estado||'cobrar',comentario:draft.comentario||'',observaciones:draft.observaciones||''};
  if(esExp&&!parcial){reg.habilitada=habil;reg.condMotivo=condMotivo;reg.compra=draft.total;reg.total=(+draft.total||0)+(+draft.embalaje||0)+(+draft.costo_flete||0)}

    if((o.comentario||'')!==(reg.comentario||'')){o.comentarioHist=o.comentarioHist||[];o.comentarioHist.push({texto:o.comentario||'(vacío)',fecha:new Date().toISOString()})}

function cupoKey(dia,tipo,nombre){return dia+'|'+tipo+'|'+nombre}

function todosCuposCerrados(dia){
  const dayO=ordenes.filter(o=>o.fecha===dia&&o.estado!=='Cancelado'&&!o.archivada);
  const porF={};dayO.filter(o=>o.flete&&necesitaFlete(o)).forEach(o=>{porF[o.flete]=true});
  const hayRetiro=dayO.some(o=>o.tipo==='Retiro')||cupoTarget[cupoKey(dia,'R','TODOS')]!=null;
  const nF=new Set(Object.keys(porF));FLETES.forEach(f=>{if(cupoTarget[cupoKey(dia,'F',f)]!=null||cupoActivo[cupoKey(dia,'F',f)])nF.add(f)});
  if(!nF.size&&!hayRetiro)return false;
  return [...nF].every(f=>cupoCerrado[cupoKey(dia,'F',f)])&&(!hayRetiro||cupoCerrado[cupoKey(dia,'R','TODOS')])}

function proxDias(desde,n){const a=[];let d=new Date(desde+'T00:00');while(a.length<n){if(d.getDay()!==0)a.push(isoOf(d));d.setDate(d.getDate()+1)}return a}

/* ============ ORDENES CERRADAS (archivo) ============ */
let cerrFil={q:'',flete:'',tipo:'',estado:'Cerrado',fecha:''};
let cerrDia='';
let cerrPag=1;const CERR_PAG_SIZE=50;
let _cerrTimer=null;
function reCerr(){clearTimeout(_cerrTimer);_cerrTimer=setTimeout(()=>{cerrPag=1;vCerradas();const el=$('cf_q');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}},300)}
function cerrMasPag(){cerrPag++;vCerradas()}
function cerrDiasConCierres(){
  return [...new Set(ordenes.filter(o=>(o.estado==='Cerrado'||o.estado==='Cancelado')&&!o.archivada&&(!cerrFil.estado||o.estado===cerrFil.estado)).map(o=>o.fecha))].sort();
}
function cerrNavDia(dir){
  const dias=cerrDiasConCierres();if(!dias.length)return;
  let i=dias.indexOf(cerrDia);
  if(i<0)i=dias.length-1;
  i=Math.max(0,Math.min(dias.length-1,i+dir));
  cerrDia=dias[i];vCerradas();
}
function vCerradas(){
  const hayFiltro=!!(cerrFil.q||cerrFil.flete||cerrFil.tipo||cerrFil.fecha);
  let list=ordenes.filter(o=>(o.estado==='Cerrado'||o.estado==='Cancelado')&&!o.archivada);
  if(cerrFil.estado)list=list.filter(o=>o.estado===cerrFil.estado);
  if(cerrFil.q)list=list.filter(o=>String(o.boleta).toLowerCase().includes(cerrFil.q.toLowerCase()));
  if(cerrFil.flete)list=list.filter(o=>o.flete===cerrFil.flete);
  if(cerrFil.tipo)list=list.filter(o=>o.tipo===cerrFil.tipo);
  if(cerrFil.fecha)list=list.filter(o=>o.fecha===cerrFil.fecha);

  let navHTML='';
  if(!hayFiltro){
    const dias=cerrDiasConCierres();
    if(!cerrDia||!dias.includes(cerrDia)){cerrDia=dias.filter(d=>d<HOY).pop()||dias[dias.length-1]||'';}
    const i=dias.indexOf(cerrDia);
    navHTML=`<div class="daynav"><button class="btn btn-ghost btn-sm" ${i<=0?'disabled':''} onclick="cerrNavDia(-1)">‹ Día anterior</button>
      <input type="date" value="${cerrDia}" onchange="cerrDia=this.value;vCerradas()">
      <button class="btn btn-ghost btn-sm" ${i>=dias.length-1?'disabled':''} onclick="cerrNavDia(1)">Día siguiente ›</button></div>`;
    list=list.filter(o=>o.fecha===cerrDia);
  }
  list=list.slice().sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id);
  const totalFiltrado=list.length;
  const visibles=hayFiltro?list.slice(0,cerrPag*CERR_PAG_SIZE):list;
  const rows=visibles.map(o=>filaOrden(o,false)).join('');
  const quedan=totalFiltrado-visibles.length;
  $('view').innerHTML=`<div class="card"><h2>Órdenes cerradas</h2><p class="muted" style="margin:0 0 10px">${hayFiltro?`Resultado de la búsqueda en todo el archivo: <b>${totalFiltrado}</b> orden${totalFiltrado===1?'':'es'}.`:'Mostrando un día por vez. Movete con las flechas o buscá en todo el archivo con los filtros de abajo.'}</p>
    <div class="macrotog" style="margin-bottom:12px"><button class="${cerrFil.estado==='Cerrado'?'on':''}" onclick="cerrFil.estado='Cerrado';cerrPag=1;vCerradas()">Cerradas</button><button class="${cerrFil.estado==='Cancelado'?'on':''}" onclick="cerrFil.estado='Cancelado';cerrPag=1;vCerradas()">Canceladas</button><button class="${cerrFil.estado===''?'on':''}" onclick="cerrFil.estado='';cerrPag=1;vCerradas()">Todas</button></div>
    <div class="ordfilters"><input id="cf_q" placeholder="Buscar N° de orden…" value="${esc(cerrFil.q)}" oninput="cerrFil.q=this.value;reCerr()"><input type="date" value="${cerrFil.fecha}" onchange="cerrFil.fecha=this.value;cerrPag=1;vCerradas()" title="Filtrar por día puntual"><select onchange="cerrFil.flete=this.value;cerrPag=1;vCerradas()"><option value="">Todos los fletes</option>${FLETES.map(f=>`<option ${cerrFil.flete===f?'selected':''}>${esc(f)}</option>`).join('')}</select><select onchange="cerrFil.tipo=this.value;cerrPag=1;vCerradas()"><option value="">Todos los tipos</option>${TIPOS.map(t=>`<option ${cerrFil.tipo===t?'selected':''}>${esc(t)}</option>`).join('')}</select>${hayFiltro?`<button class="btn btn-ghost btn-sm" onclick="cerrFil.q='';cerrFil.flete='';cerrFil.tipo='';cerrFil.fecha='';cerrPag=1;vCerradas()">Limpiar filtros</button>`:''}</div>
    ${navHTML}
    ${visibles.length?`<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>N° orden</th><th>Zona</th><th>Muebles</th><th>Flete</th><th>Cobranza</th><th>Estado</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>${quedan>0?`<div style="text-align:center;margin-top:12px"><button class="btn btn-ghost" onclick="cerrMasPag()">Mostrar ${Math.min(quedan,CERR_PAG_SIZE)} más (quedan ${quedan})</button></div>`:''}`:`<div class="empty">${hayFiltro?'No hay órdenes con esos filtros.':'No hubo cierres ese día.'}</div>`}</div>`}
function puedeSalir(o){if(o.estado!=='Coordinada')return '';
  if(o.confirmacion==='A confirmar')return 'Falta que Logística confirme la entrega';
  if(o.habilitada===false)return 'El cliente todavía no pagó — Logística la tiene que habilitar';
  if((o.lineas||[]).some(l=>l.sep==='problema'))return 'El depósito marcó un problema con la mercadería';
  if(necesitaFlete(o)&&!o.flete)return 'Todavía no tiene chofer asignado';
  return 'ok'}
function btnSalir(o,fn){if(o.estado!=='Coordinada')return '';
  const st=puedeSalir(o);
  if(st!=='ok')return `<span class="btn btn-ghost" style="flex:2;justify-content:center;opacity:.6;cursor:default" title="${esc(st)}">${esc(st)}</span>`;
  return `<button class="btn btn-primary" style="flex:2;justify-content:center" onclick="salirConPedido(${o.id},'${fn}')">Salí con este pedido</button>`}
function salirConPedido(id,fn){const o=ordenes.find(x=>x.id===id);if(!o)return;
  if(puedeSalir(o)!=='ok'){showToast(puedeSalir(o),'error');return}
  o.estadoPrev='Coordinada';o.estado='En viaje';registrarAuditoria('Despachar',o);
  if(o.comentario)showToast('Recordá: '+o.comentario,'info',6000);
  (window[fn]||vRuta)()}
function salirATodo(fecha,flete,fn){const arr=ordenes.filter(o=>o.fecha===fecha&&o.flete===flete&&o.estado==='Coordinada'&&!o.archivada);
  const ok=arr.filter(o=>puedeSalir(o)==='ok');const trabadas=arr.length-ok.length;
  if(!ok.length){showToast('Ninguno de tus viajes está listo para salir todavía.','error');return}
  ok.forEach(o=>{o.estadoPrev='Coordinada';o.estado='En viaje';registrarAuditoria('Despachar',o)});
  showToast('Saliste con '+ok.length+' viaje'+(ok.length===1?'':'s')+(trabadas?' · '+trabadas+' quedaron trabados':''),trabadas?'info':'ok',6000);
  (window[fn]||vRuta)()}
function btnSalirTodo(list,fn){const pend=list.filter(o=>o.estado==='Coordinada'&&puedeSalir(o)==='ok');
  if(pend.length<2)return '';const f=pend[0];
  return `<button class="btn btn-primary" style="width:100%;min-height:46px;justify-content:center" onclick="salirATodo('${f.fecha}','${esc(f.flete||'')}','${fn}')">Salí a repartir · ${pend.length} viajes</button>`}
function despachar(oid){const o=ordenes.find(x=>x.id===oid);if(o.confirmacion==='A confirmar'){showToast('Esta entrega todavía está A CONFIRMAR. Confirmala antes de despachar.','error');return}if(o.habilitada===false){showToast('Esta orden está condicionada a pago. Habilitala antes de despachar.','error');return}if(necesitaFlete(o)&&!o.flete){showToast('Esta orden todavía no tiene chofer asignado. Asignalo antes de despachar.','error');return}o.estadoPrev='Coordinada';o.estado='En viaje';registrarAuditoria('Despachar',o);if(o.comentario){showToast('Recordatorio para '+(o.flete||'el flete')+': '+o.comentario,'info',7000)}else{render()}}
function marcarConfirmacion(id,val){const o=ordenes.find(x=>x.id===id);o.confirmacion=val?'Confirmada':'A confirmar';vOrdenes()}
let reclamoOpen=null;let reclamoFotoTmp='';
let reaperturaOpen=null;let reaperturaErrorId=null;
function solicitarReapertura(id){reaperturaOpen=id;render()}
/* Marcar entregada es un solo paso, sin plata de por medio — el chofer la marca en el momento, o Lucas la marca desde la oficina si el chofer no lo hizo. La plata se pregunta una sola vez, al cerrar. */
function autoSalida(id){const o=ordenes.find(x=>x.id===id);if(o&&o.estado==='Coordinada'&&puedeSalir(o)==='ok'){o.estadoPrev='Coordinada';o.estado='En viaje';registrarAuditoria('Despachar',o)}}
function marcarEntregada(id){autoSalida(id);modalActivo={tipo:'entregar',oid:id};renderModal()}
function cuerpoEntregar(m){const o=ordenes.find(x=>x.id===m.oid);
  return `<h3>Confirmar entrega</h3><p class="modal-sub">Orden N° ${esc(o.boleta)} · Chofer: ${esc(o.flete||'—')}</p>
  <p style="margin:4px 0 0">¿Confirmás que <b>${esc(o.cliente||'el cliente')}</b> recibió el pedido?</p>
  <div class="modal-actions"><button class="btn btn-ghost" onclick="cerrarModal()">Volver</button><button class="btn btn-ok" onclick="confirmarEntrega()">Confirmar entrega</button></div>`}
function confirmarEntrega(){const m=modalActivo;const o=ordenes.find(x=>x.id===m.oid);o.estadoPrev='En viaje';o.estado='Entregada';registrarAuditoria('Marcar entregada',o);cerrarModal();render()}
function cancelarSolicitudReapertura(){reaperturaOpen=null;render()}
function enviarSolicitudReapertura(id){const o=ordenes.find(x=>x.id===id);const nota=$('t_reapertura')?$('t_reapertura').value.trim():'';
  if(!nota){reaperturaErrorId=id;render();const el=$('t_reapertura');if(el)el.focus();return}
  reaperturaErrorId=null;o.reaperturaSolicitada={motivo:nota,fecha:new Date().toISOString(),chofer:fleteActual};reaperturaOpen=null;render()}
function fleteProblema(id){autoSalida(id);reclamoOpen=id;reclamoFotoTmp='';render()}
function onReclamoFoto(el){const f=el.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{reclamoFotoTmp=r.result;const pv=$('fotoPrev');if(pv)pv.innerHTML='<img src="'+reclamoFotoTmp+'" style="max-width:120px;border-radius:6px;margin-left:8px;vertical-align:middle">'};r.readAsDataURL(f)}
function enviarReclamo(id){const o=ordenes.find(x=>x.id===id);o.reclamoNota=$('t_reclamo')?$('t_reclamo').value.trim():'';if(reclamoFotoTmp)o.reclamoFoto=reclamoFotoTmp;o.estadoPrev=o.estado;o.estado='En reclamo';reclamoOpen=null;reclamoFotoTmp='';render()}
function editarComentario(id){const o=ordenes.find(x=>x.id===id);const actual=o.comentario||'';const nuevo=prompt('Comentario para el flete (dejalo vacío para borrarlo):',actual);if(nuevo===null)return;const limpio=nuevo.trim();if(limpio===actual)return;o.comentarioHist=o.comentarioHist||[];o.comentarioHist.push({texto:actual||'(vacío)',fecha:new Date().toISOString()});o.comentario=limpio;render()}
function verComentarioHist(id){const o=ordenes.find(x=>x.id===id);const hist=o.comentarioHist||[];const w=window.open('','_blank');const filas=hist.map(h=>'<div style="margin-bottom:10px"><div class="muted" style="font-size:11px">'+new Date(h.fecha).toLocaleString('es-AR')+'</div><div>'+esc(h.texto)+'</div></div>').join('')||'<p class="muted">Sin historial todavía.</p>';w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Historial de comentario '+esc(o.boleta)+'</title><style>body{font-family:Arial;max-width:480px;margin:24px auto;padding:0 18px;color:#0f1a2a}h2{color:#16324f;margin:0 0 4px}.muted{color:#8a94a3}</style></head><body><h2>Historial · Orden '+esc(o.boleta)+'</h2><div style="margin:14px 0"><b>Actual:</b><br>'+esc(o.comentario||'(vacío)')+'</div><hr>'+filas+'</body></html>');w.document.close()}
let reclamoVerOpen=null;let reclamoVerPos=null;
function verReclamo(id,ev){if(reclamoVerOpen===id){reclamoVerOpen=null;reclamoVerPos=null;render();return}

/* ============ MODALES PROPIOS (reemplazan confirm/prompt del navegador) ============ */
const MOTIVOS_CANCEL=['Error de tipeo','El cliente no puede recibirlo','El chofer no llegó a domicilio en horario','Otros'];
const MOTIVOS_REPROG=['El cliente no podía recibirlo','El flete no llega ese día','El mueble no estaba en condiciones','Otros'];
let modalActivo=null;
function cerrarModal(){modalActivo=null;renderModal()}
function renderModal(){const el=$('modalRoot');if(!el)return;if(!modalActivo){el.innerHTML='';return}
  el.innerHTML=`<div class="modal-overlay" onclick="cerrarModal()"><div class="modal-card" onclick="event.stopPropagation()">${cuerpoModal()}</div></div>`}
function cuerpoModal(){const m=modalActivo;if(m.tipo==='cancelar')return cuerpoCancelar(m);if(m.tipo==='reprogramar')return cuerpoReprogramar(m);if(m.tipo==='cobro')return cuerpoCobro(m);if(m.tipo==='estado')return cuerpoEstado(m);if(m.tipo==='estadohist')return cuerpoEstadoHist(m);if(m.tipo==='problema')return cuerpoProblema(m);if(m.tipo==='verproblema')return cuerpoVerProblema(m);if(m.tipo==='entregar')return cuerpoEntregar(m);if(m.tipo==='reasignar')return cuerpoReasignar(m);if(m.tipo==='firmarprob')return cuerpoFirmarProb(m);if(m.tipo==='reabrirlote')return cuerpoReabrirLote(m);if(m.tipo==='imprimirSemana')return cuerpoImprimirSemana(m);if(m.tipo==='eliminar')return cuerpoEliminar(m);if(m.tipo==='solicitarElim')return cuerpoSolicitarElim(m);if(m.tipo==='refuerzo')return cuerpoRefuerzo(m);return''}
/* ===== Refuerzo de seña =====
   El cliente vino a reforzar y pagó en el local; el vendedor lo carga en la orden para
   que Lucas (logística) lo vea en "Cargadas por vendedores" y lo confirme. Es un campo
   aditivo: no toca el estado ni el ciclo de la orden. */
function abrirModalRefuerzo(oid){const o=ordenes.find(x=>x.id===oid);if(!o)return;const pend=o.refuerzo&&!o.refuerzo.confirmado?o.refuerzo:null;modalActivo={tipo:'refuerzo',oid,monto:pend?pend.monto:'',nota:pend?pend.nota:''};renderModal()}
function cuerpoRefuerzo(m){const o=ordenes.find(x=>x.id===m.oid);if(!o)return'';const yaConf=o.refuerzo&&o.refuerzo.confirmado;const pend=o.refuerzo&&!o.refuerzo.confirmado;
  return `<h3>💲 Refuerzo de seña</h3><p class="modal-sub">Orden N° ${esc(o.boleta)}${o.cliente?' · '+esc(o.cliente):''}</p>
  <p style="font-size:13.5px;color:#5b6472;line-height:1.5">El cliente vino a reforzar y pagó en el local. Cargá el monto para que Lucas lo vea en "Cargadas por vendedores" y lo confirme.</p>
  ${yaConf?`<div class="badge e-ok" style="margin-bottom:10px">Ya hay un refuerzo confirmado de ${money(o.refuerzo.monto)} (${esc(o.refuerzo.confirmadoPor||'')}). Cargar otro lo reemplaza.</div>`:''}
  ${pend?`<div class="badge e-cond" style="margin-bottom:10px">Refuerzo cargado ${money(o.refuerzo.monto)} por ${esc(o.refuerzo.por||'')} — a confirmar por Lucas.</div>`:''}
  <label>Monto que pagó</label><input id="mrf_monto" inputmode="numeric" placeholder="$" value="${m.monto?money(m.monto):''}" oninput="modalActivo.monto=moneyParse(this.value)">
  <label>Nota (opcional)</label><textarea id="mrf_nota" placeholder="Ej: vino a reforzar, pagó en efectivo" oninput="modalActivo.nota=this.value">${esc(m.nota||'')}</textarea>
  <div class="modal-actions"><button class="btn btn-ghost" onclick="cerrarModal()">Volver</button><button class="btn btn-primary" onclick="guardarRefuerzo()">${pend?'Actualizar refuerzo':'Cargar refuerzo'}</button></div>`}
function guardarRefuerzo(){const m=modalActivo;const o=ordenes.find(x=>x.id===m.oid);if(!o)return;const monto=moneyParse($('mrf_monto')?$('mrf_monto').value:m.monto);
  if(!monto||monto<=0){showToast('Poné el monto del refuerzo.','error');const el=$('mrf_monto');if(el)el.focus();return}
  const nota=($('mrf_nota')?$('mrf_nota').value:m.nota||'').trim();

  o.refuerzo={monto,nota,por:quien,rol:role,ts:new Date().toISOString(),confirmado:false,confirmadoPor:null,confirmadoTs:null};

  o.estadoHist=o.estadoHist||[];o.estadoHist.push({de:o.estado,a:m.nuevo,motivo:m.motivo.trim(),quien:whoLabel(),fecha:new Date().toISOString()});

function abrirModalCobro(oid,modo,saldo){const o=ordenes.find(x=>x.id===oid);
  const cobradoInicial=(modo==='cerrar'&&o.cobrado!=null)?o.cobrado:saldo;
  const bhInicial=(modo==='cerrar'&&o.bhPago!=null)?o.bhPago:costosPagados(o);
  modalActivo={tipo:'cobro',oid,modo,saldo,cobrado:cobradoInicial,bh:bhInicial,motivo:(modo==='cerrar'?(o.cobradoDiffMotivo||o.bhPagoMotivo||''):''),notaGeneral:''};renderModal()}
function cuerpoCobro(m){const o=ordenes.find(x=>x.id===m.oid);const diff=m.cobrado-m.saldo;
  const diffCls=diff===0?'ok':(diff<0?'falta':'demas');
  const diffTxt=diff===0?'✓ Cierra exacto':(diff<0?'Falta '+money(-diff):'Cobró '+money(diff)+' de más');
  const bhEsperado=costosPagados(o);const bhExtra=m.bh-bhEsperado;
  const necesitaMotivo=(diff!==0)||(bhExtra!==0);
  return `<h3>${m.modo==='retiro'?'Confirmar retiro y cobro':'Recibir del chofer'}</h3><p class="modal-sub">Orden N° ${esc(o.boleta)} · Chofer: ${esc(o.flete||'—')}${m.modo==='cerrar'&&o.cobrado!=null?' · Ya habías cargado estos valores, revisalos':''}</p>
  <div class="modal-saldo"><span>Tenía que cobrar</span><b>${money(m.saldo)}</b></div>
  <label>¿Cuánto cobró realmente?</label><input type="text" inputmode="numeric" id="mz_cobrado" value="${moneyFmt(m.cobrado)}" oninput="onCobradoInput()">
  <div id="mz_diff" class="modal-diff ${diffCls}">${diffTxt}</div>
  <label>¿Belgrano Home le pagó algo adicional al chofer? ${bhEsperado>0?`<span class="hint">(precargado ${money(bhEsperado)} por los costos marcados "Pagado" en esta orden)</span>`:''}</label><input type="text" inputmode="numeric" id="mz_bh" value="${moneyFmt(m.bh)}" oninput="onBhInput()">
  ${necesitaMotivo?`<label>Motivo (${diff!==0?'diferencia':'pago adicional no explicado por la orden'})</label><textarea id="mz_motivo" class="${m.motivoError&&!(m.motivo||'').trim()?'field-error':''}" oninput="modalActivo.motivo=this.value;this.classList.remove('field-error');const em=document.getElementById('mz_motivo_err');if(em)em.style.display='none'" placeholder="Contá qué pasó">${esc(m.motivo)}</textarea><div id="mz_motivo_err" class="field-error-msg" style="${m.motivoError&&!(m.motivo||'').trim()?'':'display:none'}">Este campo es obligatorio — contá qué pasó.</div>`:''}
  <label>Comentario del chofer sobre la entrega <span class="hint">(opcional — un reclamo, algo que faltó, cómo salió)</span></label><textarea id="mz_nota" oninput="modalActivo.notaGeneral=this.value" placeholder="Ej: faltó un taquito, el cliente se quejó por la demora…">${esc(m.notaGeneral)}</textarea>
  <p class="hint" style="margin:2px 0 0">${m.modo==='retiro'?'Queda como "Por rendir" hasta que Jony confirme y firme.':'Queda como "Por rendir" — Jony todavía tiene que confirmar y firmar la rendición.'}</p>
  <div class="modal-actions"><button class="btn btn-ghost" onclick="cerrarModal()">Volver</button><button class="btn btn-primary" onclick="confirmarCobro()">${m.modo==='retiro'?'Confirmar retiro':'Confirmar recepción'}</button></div>`}
function onCobradoInput(){moneyIn($('mz_cobrado'));const el=$('mz_cobrado');const pos=el.value.length;modalActivo.cobrado=moneyParse(el.value);renderModal();const el2=$('mz_cobrado');if(el2){el2.focus();el2.setSelectionRange(el2.value.length,el2.value.length)}}
function onBhInput(){moneyIn($('mz_bh'));modalActivo.bh=moneyParse($('mz_bh').value);renderModal();const el=$('mz_bh');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}}
function confirmarCobro(){const m=modalActivo;const o=ordenes.find(x=>x.id===m.oid);const diff=m.cobrado-m.saldo;const bhExtra=m.bh-costosPagados(o);
  if((diff!==0||bhExtra!==0)&&!(m.motivo||'').trim()){modalActivo.motivoError=true;renderModal();const el=$('mz_motivo');if(el){el.focus();el.scrollIntoView({block:'center',behavior:'smooth'})}return}
  o.cobrado=m.cobrado;o.cobradoDiffMotivo=diff!==0?(m.motivo||'').trim():'';o.bhPago=m.bh;o.bhPagoMotivo=bhExtra!==0?(m.motivo||'').trim():'';
  o.seLleva=costosACobrar(o);
  const nota=(m.notaGeneral||'').trim();
  if(nota){o.notaEntregaHist=o.notaEntregaHist||[];o.notaEntregaHist.push({nota,chofer:o.flete||'',fecha:new Date().toISOString()});o.notaEntrega=nota}
  o.rendido=false;o.estadoPrev=o.estado;o.estado='Por rendir';
  registrarAuditoria(m.modo==='retiro'?'Confirmar retiro':'Recibir del chofer',o,diff!==0||bhExtra!==0?(m.motivo||'').trim():null);
  cerrarModal();vOrdenes()}

function imprimirExpreso(o){
  const m2=n=>'$'+Number(n||0).toLocaleString('es-AR');
  const rows=(o.lineas||[]).map((l,i)=>`<div style="display:grid;grid-template-columns:34px 56px 1fr;grid-column:1/-1"><div style="padding:8px;border-bottom:1px solid #eef0f2">${i+1}</div><div style="padding:8px;border-bottom:1px solid #eef0f2">${l.cant}</div><div style="padding:8px;border-bottom:1px solid #eef0f2">${esc(l.desc)}</div></div>`).join('');
  const muebTable=`<div style="margin-top:18px"><div style="font-size:11px;font-weight:700;letter-spacing:1px;color:#0f766e;margin-bottom:6px">DETALLE DE MERCADERÍA</div><div style="display:grid;grid-template-columns:34px 56px 1fr;font-size:12.5px"><div style="padding:6px 8px;border-bottom:1.5px solid #d7dbe0;color:#5b6472;font-size:10px;font-weight:700">#</div><div style="padding:6px 8px;border-bottom:1.5px solid #d7dbe0;color:#5b6472;font-size:10px;font-weight:700">CANT</div><div style="padding:6px 8px;border-bottom:1.5px solid #d7dbe0;color:#5b6472;font-size:10px;font-weight:700">MUEBLE</div>${rows}</div></div>`;

function imprimirCDist(semana){let body='';

    const dias=proxDias(HOY,6);
    const elegidos=_cdImprimirChoferes; // null = todos
    body='';

      const dayO=ordenes.filter(o=>o.fecha===iso&&o.estado!=='Cancelado'&&!o.archivada);

      const groups={};dayO.forEach(o=>{const k=o.flete||'Sin asignar';(groups[k]=groups[k]||[]).push(o)});
      let choferKeys=Object.keys(groups).sort();
      if(elegidos&&elegidos.length)choferKeys=choferKeys.filter(k=>elegidos.includes(k));
      if(!choferKeys.length)return;

      choferKeys.forEach(k=>{
        const arr=groups[k];
        const rows=arr.flatMap(o=>o.lineas.map(l=>`<tr><td>${l.cant}</td><td>${esc(l.desc)}</td><td>${esc(o.boleta)}</td><td>${esc(l.local)}</td><td>${l.sep==='separado'?'Separado':(l.sep==='problema'?'PROBLEMA':'')}</td></tr>`)).join('');
        const totMuebles=arr.reduce((s,o)=>s+sum(o.lineas.map(l=>l.cant)),0);
        diaBody+=`<h3 style="margin:14px 0 4px">${esc(k)} <span style="font-weight:400;color:#5b6472;font-size:13px">· ${totMuebles} mueble${totMuebles===1?'':'s'}</span></h3><table><tr><th>Cant</th><th>Mueble</th><th>N° orden</th><th>Sale de</th><th>Estado</th></tr>${rows}</table>`;
      });
      diaBody+='</div>';
      body+=diaBody;
    });
    if(!body)body='<p style="color:#5b6472">No hay muebles para separar en la semana con esa selección.</p>';
  }
  else{const dayO=ordenes.filter(o=>o.fecha===cdistDay&&o.estado!=='Cancelado'&&!o.archivada);const groups={};dayO.forEach(o=>{const k=o.flete||'Sin asignar';(groups[k]=groups[k]||[]).push(o)});body=`<h2>Día ${fmt(cdistDay)}</h2>`+Object.keys(groups).map(k=>{const arr=groups[k];const rows=arr.flatMap(o=>o.lineas.map(l=>`<tr><td>${esc(o.boleta)}</td><td>${l.cant}</td><td>${esc(l.desc)}</td><td>${esc(l.local)}</td><td>${l.sep==='separado'?'Separado':(l.sep==='problema'?'PROBLEMA':'')}</td></tr>`)).join('');return `<h3>${esc(k)}</h3><table><tr><th>Orden</th><th>Cant</th><th>Mueble</th><th>Sale de</th><th>Estado</th></tr>${rows}</table>`}).join('')}
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Centro de Distribución</title><style>body{font-family:Arial;max-width:820px;margin:20px auto;padding:0 20px;color:#0f1a2a}h1{color:#16324f;margin:0 0 4px}h3{margin:14px 0 4px}table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}td,th{border:1px solid #d9e0e8;padding:6px 8px;text-align:left}@media print{.np{display:none}.diapage{page-break-after:always}.diapage:last-child{page-break-after:auto}}</style></head><body><h1>BELGRANO HOME · Centro de Distribución</h1>${body}<button class="np" onclick="window.print()" style="padding:8px 14px;background:#16324f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700">Imprimir</button></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close()}

function rendResClass(r){return{'Recibí OK':'r-ok','Falta':'r-falta','Sobra':'r-sobra','No rindió':'r-no'}[r]||'r-ok'}
/* Estadísticas de un día para los daypills y las tarjetas-filtro, mismo patrón que Centro de Distribución */
function rendStats(iso){const src=ordenes.filter(o=>o.fecha===iso&&o.estado!=='Cancelado'&&!o.archivada&&(o.flete||o.tipo==='Retiro'));
  const faltanRecibir=src.filter(o=>o.estado!=='Por rendir'&&o.estado!=='Cerrado').length;
  const porRendirSinFirmar=src.filter(o=>(o.estado==='Por rendir'||o.estado==='Cerrado')&&!o.rendido).length;
  const rendidas=src.filter(o=>o.rendido).length;
  const conProblema=src.filter(o=>o.estado==='En reclamo'||(o.rendido&&o.rendResult&&o.rendResult!=='Recibí OK')).length;
  return {tot:src.length,faltanRecibir,porRendirSinFirmar,rendidas,conProblema}}
function rendDayTabs(){const dias=proxDias(HOY,6);
  return `<div class="daytabs">${dias.map(iso=>{const s=rendStats(iso);const pend=s.tot-s.rendidas;const label=iso===HOY?'HOY':(iso===addDays(HOY,1)?'MAÑANA':DOW[new Date(iso+'T00:00').getDay()]);const pp=iso.split('-');

  <div class="stat clik" style="background:#eef2ff;${sel('sinrendir','#3730a3')}" onclick="rendFil='sinrendir';vRendicion()"><div style="color:#3730a3;font-size:13px;font-weight:700">Por rendir sin firmar</div><div class="value" style="color:#3730a3">${st.porRendirSinFirmar}</div></div>
  <div class="stat clik" style="background:#e7f5ec;${sel('rendidas','#15803d')}" onclick="rendFil='rendidas';vRendicion()"><div style="color:#15803d;font-size:13px;font-weight:700">Rendidas</div><div class="value" style="color:#15803d">${st.rendidas}</div></div>
  <div class="stat clik" style="${sel('todos','#16324f')}" onclick="rendFil='todos';vRendicion()"><div class="muted">Total viajes</div><div class="value">${st.tot}</div></div>

function rendChoferChips(iso){const src=ordenes.filter(o=>o.fecha===iso&&o.estado!=='Cancelado'&&!o.archivada&&(o.flete||o.tipo==='Retiro'));
  const choferes=[...new Set(src.map(grupoRend))].sort((a,b)=>a.indexOf('Retiro')===0?1:(b.indexOf('Retiro')===0?-1:a.localeCompare(b)));

  </div>`}
function rendMatch(o){if(rendChoferFil&&grupoRend(o)!==rendChoferFil)return false;
  if(rendFil==='recibir')return o.estado!=='Por rendir'&&o.estado!=='Cerrado';
  if(rendFil==='sinrendir')return (o.estado==='Por rendir'||o.estado==='Cerrado')&&!o.rendido;
  if(rendFil==='rendidas')return !!o.rendido;
  if(rendFil==='prob')return o.estado==='En reclamo'||(o.rendido&&o.rendResult&&o.rendResult!=='Recibí OK');
  return true}
function filaRend(o){const yaRecibido=recibido(o);
  const esperado=cobroBH(o);
  const pag=lePagamosBase(o);const adic=adicionalPagado(o);const neto=netoOrdenBH(o);
  let cobTxt;
  if(!yaRecibido){cobTxt=`<span class="muted">${money(esperado)} <span style="font-size:11px">(estimado)</span></span>`}
  else{const real=o.cobrado!=null?o.cobrado:esperado;const diff=real-esperado;
    if(diff===0){cobTxt=`<b>${money(real)}</b>`}
    else{const motivo=o.cobradoDiffMotivo||'Sin motivo cargado';const cobKey='cob_'+o.id;

  const semana=restoDias.map(iso=>{const listDia=ordenes.filter(o=>o.fecha===iso&&o.flete===rutaFleteSel&&o.estado!=='Cancelado'&&!o.archivada);if(!listDia.length)return'';
    const porZona={};listDia.forEach(o=>{const z=o.zona||'—';(porZona[z]=porZona[z]||[]).push(o)});
    const zonasHTML=Object.entries(porZona).map(([z,arr])=>{const itemsHTML=arr.map(o=>`<div class="muted" style="padding:2px 0">${esc(o.cliente||'')} · ${esc(o.localidad||o.direccion||'')} · ${esc(o.horario||'')}</div>`).join('');
      return `<div style="margin-top:10px"><b>${esc(zonaLimpia(z))}</b> <span class="muted">· ${arr.length} viaje${arr.length===1?'':'s'}</span>${itemsHTML}</div>`}).join('');
    const label=iso===addDays(HOY,1)?'MAÑANA':DOW[new Date(iso+'T00:00').getDay()];const pp=iso.split('-');
    return `<div class="card"><div class="section-title"><h3 style="margin:0">${label} · ${+pp[2]}/${+pp[1]}</h3><span class="muted">${listDia.length} viaje${listDia.length===1?'':'s'}</span></div>${zonasHTML}</div>`}).join('');
  $('view').innerHTML=`<div class="card"><div class="section-title"><h2>Ruta del flete · ${fmt(HOY)}</h2><span class="muted">${list.length} viaje${list.length===1?'':'s'} hoy</span></div>
    <label class="lbl" style="display:block;margin:6px 0 4px">Ver la ruta de:</label>
    <select style="max-width:280px;height:40px" onchange="rutaFleteSel=this.value;vRutaFlete()"><option value="">Elegí un chofer…</option>${opts}</select>${btnRecorrido(list)?`<div style="margin-top:12px">${btnRecorrido(list)}</div>`:''}${btnOrdenHorario(list,'vRutaFlete')?`<div style="margin-top:8px">${btnOrdenHorario(list,'vRutaFlete')}</div>`:''}</div><div class="ruta-wrap">${cardsHoy}</div>${semana?`<div class="sub-h" style="margin:20px 2px 8px">Su semana</div>${semana}`:''}`}
/* Bloque de un costo adicional (envío/instalación/escalera) con su selector de estado de pago — orden fijo: A cobrar, Pagado, Sin costo, default A cobrar */
function costosTabla(){
  const est_flete=estadoCosto(draft,'costo_flete');
  const est_inst=estadoCosto(draft,'instalacion');
  const hayInstalacion=(draft.lineas||[]).some(l=>l.instala);
  const notaFlete=est_flete==='pagado'?`Belgrano Home le debe ${money(draft.costo_flete||0)} al chofer`:(est_flete==='cobrar'&&draft.costo_flete>0?`El chofer cobra ${money(draft.costo_flete)} extra en destino`:'');
  const notaInst=est_inst==='pagado'?`Belgrano Home le debe ${money(draft.instalacion||0)} al chofer`:(est_inst==='cobrar'&&draft.instalacion>0?`El chofer cobra ${money(draft.instalacion)} extra en destino`:'');
  return `<div class="costo-tabla"><table>
    <tr class="ct-head"><td class="ct-lbl">Concepto</td><td class="ct-est">Estado</td><td class="ct-monto">Monto</td></tr>
    <tr>
      <td class="ct-lbl">Envío</td>
      <td class="ct-est"><select onchange="setEstadoCosto('costo_flete',this.value)">
        <option value="cobrar" ${est_flete==='cobrar'?'selected':''}>A cobrar</option>
        <option value="pagado" ${est_flete==='pagado'?'selected':''}>Pagado</option>
        <option value="sincosto" ${est_flete==='sincosto'?'selected':''}>Sin costo</option>
      </select></td>
      <td class="ct-monto"><input type="text" inputmode="numeric" id="w_cflete" value="${draft.costo_flete?moneyFmt(draft.costo_flete):''}" placeholder="$0" oninput="moneyIn(this);readStep();refreshCostos();refreshNotaCosto('costo_flete','w_cflete')"></td>
    </tr><tr id="nrow_costo_flete" style="${notaFlete?'':'display:none'}"><td colspan="3" id="nota_costo_flete" class="ct-nota">${notaFlete}</td></tr>
    ${hayInstalacion?`<tr>
      <td class="ct-lbl">Instalación</td>
      <td class="ct-est"><select onchange="setEstadoCosto('instalacion',this.value)">
        <option value="cobrar" ${est_inst==='cobrar'?'selected':''}>A cobrar</option>
        <option value="pagado" ${est_inst==='pagado'?'selected':''}>Pagado</option>
        <option value="sincosto" ${est_inst==='sincosto'?'selected':''}>Sin costo</option>
      </select></td>
      <td class="ct-monto"><input type="text" inputmode="numeric" id="w_inst" value="${draft.instalacion?moneyFmt(draft.instalacion):''}" placeholder="$0" oninput="moneyIn(this);readStep();refreshCostos();refreshNotaCosto('instalacion','w_inst')"></td>
    </tr><tr id="nrow_instalacion" style="${notaInst?'':'display:none'}"><td colspan="3" id="nota_instalacion" class="ct-nota">${notaInst}</td></tr>`:''}
    <tr>
      <td class="ct-lbl">Escalera</td>
      <td class="ct-est"><span class="muted">—</span></td>
      <td class="ct-monto"><input type="text" inputmode="numeric" id="w_esc" value="${draft.escalera?moneyFmt(draft.escalera):''}" placeholder="$0" oninput="moneyIn(this);readStep()"></td>
    </tr><tr><td colspan="3" class="ct-nota">Por piso × bulto, si no entra en ascensor — no suma al saldo, solo sale en el remito</td></tr>
  </table></div>`;
}
function refreshNotaCosto(campo,inputId){
  const fila=$('nrow_'+campo);const celda=$('nota_'+campo);if(!fila||!celda)return;
  const valor=moneyParse($(inputId).value);
  const est=estadoCosto(draft,campo);
  const nota=est==='pagado'?`Belgrano Home le debe ${money(valor||0)} al chofer`:(est==='cobrar'&&valor>0?`El chofer cobra ${money(valor)} extra en destino`:'');
  celda.textContent=nota;fila.style.display=nota?'':'none'}
function setEstadoCosto(campo,val){readStep();draft[campo+'_estado']=val;if(val==='sincosto')draft[campo]=0;vCargar()}
function vConfig(){const chips=(arr,fn)=>arr.length?arr.map((v,i)=>`<span class="chip">${i>0?`<button class="ordbtn" title="Mover antes" onclick="${fn}Mv(${i},-1)">◀</button>`:''}${esc(v)}${i<arr.length-1?`<button class="ordbtn" title="Mover después" onclick="${fn}Mv(${i},1)">▶</button>`:''} <button onclick="${fn}(${i})">×</button></span>`).join(''):'<span class="muted">Sin valores.</span>';
  $('view').innerHTML=`<div class="card"><h2>Configuración</h2><p class="muted">Agregá, saques o reordená los valores que usa la app — el orden acá define el orden en los desplegables de Cargar y Órdenes. Los cambios se ven al instante.</p></div>
  <div class="card"><h3>Tipos de envío</h3><div class="chips">${chips(TIPOS,'delTipo')}</div><div class="addrow"><input id="cfg_tipo" placeholder="Nuevo tipo de envío"><button class="btn btn-primary btn-sm" onclick="addCfg('tipo')">Agregar</button></div></div>
  <div class="card"><h3>Fletes</h3><p class="muted">El orden acá es el orden en que aparecen en el desplegable de asignar chofer — poné arriba a los que más usás.</p><div class="chips">${chips(FLETES,'delFlete')}</div><div class="addrow"><input id="cfg_flete" placeholder="Nuevo flete"><button class="btn btn-primary btn-sm" onclick="addCfg('flete')">Agregar</button></div></div>
  <div class="card"><h3>Subida por escalera</h3><p class="muted">Valor por defecto que se precarga en cada orden nueva (envío o retiro, por piso × bulto). Se puede modificar puntualmente en cada orden si se pactó otra cosa con el cliente.</p><div class="addrow"><input id="cfg_esc" inputmode="numeric" value="${moneyFmt(ESCALERA_DEF)}" oninput="moneyIn(this)"><button class="btn btn-primary btn-sm" onclick="setEscaleraDef()">Guardar</button></div></div>
  <div class="card"><h3>Locales de origen</h3><div class="chips">${chips(LOCALES,'delLocal')}</div><div class="addrow"><input id="cfg_local" placeholder="Nuevo local"><button class="btn btn-primary btn-sm" onclick="addCfg('local')">Agregar</button></div></div>
  <div class="card"><h3>Localidades</h3><p class="muted">Son ~170 (CABA + GBA), cada una con su zona. Las administramos en una pantalla aparte para no tocar el ruteo (próximo paso).</p></div>
  ${(()=>{const arch=ordenes.filter(o=>o.archivada).sort((a,b)=>(b.archivadaInfo&&b.archivadaInfo.fecha||'').localeCompare(a.archivadaInfo&&a.archivadaInfo.fecha||''));if(!arch.length)return '<div class="card"><h3>Viajes eliminados</h3><p class="muted">No hay viajes eliminados. Cuando elimines uno, va a aparecer acá y vas a poder recuperarlo.</p></div>';return `<div class="card"><h3>Viajes eliminados (${arch.length})</h3><p class="muted">Están fuera de todas las vistas y conteos. Podés recuperarlos si hizo falta.</p><div class="table-wrap"><table><thead><tr><th>Fecha</th><th>N° orden</th><th>Cliente</th><th>Eliminado por</th><th>Motivo</th><th></th></tr></thead><tbody>${arch.map(o=>`<tr><td>${fmt(o.fecha)}</td><td><b>${esc(o.boleta)}</b></td><td>${esc(o.cliente||'')}</td><td>${esc(o.archivadaInfo&&o.archivadaInfo.por||'—')}</td><td class="muted">${esc(o.archivadaInfo&&o.archivadaInfo.motivo||'—')}</td><td><button class="btn btn-ghost btn-sm" onclick="recuperarViaje(${o.id})">Recuperar</button></td></tr>`).join('')}</tbody></table></div></div>`})()}`}
function setEscaleraDef(){const v=moneyParse($('cfg_esc').value);ESCALERA_DEF=v||0;sbGuardarConfig();vConfig()}
function addCfg(k){const m={tipo:['cfg_tipo',TIPOS],flete:['cfg_flete',FLETES],local:['cfg_local',LOCALES]}[k];const v=$(m[0]).value.trim();if(v&&!m[1].includes(v))m[1].push(v);sbGuardarConfig();vConfig()}
function delTipo(i){TIPOS.splice(i,1);sbGuardarConfig();vConfig()}
function delFlete(i){FLETES.splice(i,1);sbGuardarConfig();vConfig()}
function delLocal(i){LOCALES.splice(i,1);sbGuardarConfig();vConfig()}
function moverArr(arr,i,dir){const j=i+dir;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]]}
function delTipoMv(i,dir){moverArr(TIPOS,i,dir);sbGuardarConfig();vConfig()}
function delFleteMv(i,dir){moverArr(FLETES,i,dir);sbGuardarConfig();vConfig()}
function delLocalMv(i,dir){moverArr(LOCALES,i,dir);sbGuardarConfig();vConfig()}

/* Cierra el menú de acciones de la fila (⋮), el panel de muebles y el de reclamo al tocar afuera */
document.addEventListener('click',function(e){
  if(ordMenuOpen!==null && !e.target.closest('.ord-actions')){ordMenuOpen=null;render()}
  if(probBoletaOpen!==null && !e.target.closest('.rowacc')){probBoletaOpen=null;render()}
  if(muebleOpen!==null && !e.target.closest('.mueble-pop') && !e.target.closest('[title="Ver muebles a entregar"]')){muebleOpen=null;mueblePos=null;render()}
  if(comentVerOpen!==null && !e.target.closest('.mueble-pop') && !e.target.closest('[title="Ver comentario"]') && !e.target.closest('[title="Ver nota de entrega"]') && !e.target.closest('[title="Horario especial"]') && !e.target.closest('[title="Horario estándar"]')){comentVerOpen=null;comentVerPos=null;render()}
  if(motivoPopOpen!==null && !e.target.closest('.mueble-pop') && !e.target.closest('.motivo-trigger')){motivoPopOpen=null;motivoPopPos=null;render()}
  if(reclamoVerOpen!==null && !e.target.closest('.mueble-pop') && !e.target.closest('[title="Ver reclamo"]')){reclamoVerOpen=null;reclamoVerPos=null;render()}
});

/* Enter avanza al siguiente campo (principalmente en Cargar orden, para no usar el mouse) */
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  const el=e.target;
  if(el.tagName==='TEXTAREA')return; // en comentarios, Enter hace salto de línea
  if(el.tagName!=='INPUT'&&el.tagName!=='SELECT')return;
  if(tab!=='cargar')return;
  e.preventDefault();
  const focusables=[...document.querySelectorAll('#view input:not([type=file]):not([disabled]),#view select:not([disabled])')].filter(x=>x.offsetParent!==null);
  const i=focusables.indexOf(el);
  if(i>-1&&i<focusables.length-1){focusables[i+1].focus();if(focusables[i+1].select)focusables[i+1].select()}
  else{const nextBtn=document.querySelector('.wiz-nav .btn-primary,.wiz-nav .btn-ok');if(nextBtn)nextBtn.click()}
});
iniciarConLogin();
</script>
