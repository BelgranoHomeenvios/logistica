let zdView='dia';
function zonaDist(iso){
  const scope=zdView==='semana'?semanaDe(iso):[iso];
  const day=ordenes.filter(o=>scope.includes(o.fecha)&&o.estado!=='Cancelado');
  const geo=day.filter(o=>o.zona&&o.zona!=='Retiro'&&o.zona!=='Expreso'&&o.zona!=='Mov. interno');
  const byZ={};geo.forEach(o=>byZ[o.zona]=(byZ[o.zona]||0)+1);
  const arr=Object.entries(byZ).sort((a,b)=>b[1]-a[1]);
  const max=Math.max(1,...arr.map(x=>x[1]));const tot=Math.max(1,arr.reduce((a,z)=>a+z[1],0));
  const zrow=(z,n,click,extra)=>`<div class="zrow${extra||''}" onclick="${click}"><div class="zname">${esc(z)}</div><div class="zbar"><div class="zfill" style="width:${Math.max(6,Math.round(n/max*100))}%"></div></div><div class="zn">${n} <span class="muted">· ${Math.round(n/tot*100)}%</span></div></div>`;
  let html=arr.length?('<div class="zdist">'+arr.map(([z,n])=>zrow(z,n,`irOrdenes({day:'${iso}',zona:'${esc(z)}'})`)).join('')+'</div>'):'<div class="empty">Sin entregas a domicilio ese día.</div>';
  // No-geográficos: retiros por local + movimientos internos
  const ret={};day.filter(o=>o.tipo==='Retiro').forEach(o=>{const l=retLoc(o);ret[l]=(ret[l]||0)+1});
  const movs=day.filter(o=>o.tipo==='Movimiento Interno').length;
  const extras=[];
  Object.entries(ret).sort((a,b)=>b[1]-a[1]).forEach(([l,n])=>extras.push(zrow('Retiro · '+l,n,`irOrdenes({day:'${iso}',ret:'${esc(l)}'})`,' zother')));
  if(movs)extras.push(zrow('Mov. interno',movs,`irOrdenes({day:'${iso}',tipo:'Movimiento Interno'})`,' zother'));
  if(extras.length)html+='<div class="zsep">Retiros y movimientos</div><div class="zdist">'+extras.join('')+'</div>';
  return html;
}

function toCSV(labels,rows){return [labels.map(csvCell).join(';')].concat(rows.map(r=>r.map(csvCell).join(';'))).join('\r\n')}
function descargarCSV(nombre,contenido){const blob=new Blob(['\ufeff'+contenido],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=nombre;a.click();URL.revokeObjectURL(url)}

function parseCSV(text){const rows=[];let i=0,field='',row=[],inq=false;text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<text.length){const c=text[i];
    if(inq){if(c==='"'){if(text[i+1]==='"'){field+='"';i++}else inq=false}else field+=c}
    else{if(c==='"')inq=true;else if(c===';'){row.push(field);field=''}else if(c==='\n'){row.push(field);rows.push(row);row=[];field=''}else field+=c}
    i++}
  if(field.length||row.length){row.push(field);rows.push(row)}
  return rows}
function importarArchivo(el){const f=el.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{previsualizarImport(r.result);el.value=''};r.readAsText(f)}
function previsualizarImport(text){const rows=parseCSV(text);if(!rows.length){alert('El archivo esta vacio.');return}

  const data=rows.slice(1).filter(r=>r.some(c=>String(c).trim()));
  const parsed=data.map(r=>{const g=k=>idx[k]>=0?String(r[idx[k]]||'').trim():'';
    const o={boleta:g('boleta'),fecha:g('fecha'),tipo:g('tipo')||'Envío',horario:g('horario')||'12 a 19hs',cliente:g('cliente'),tel1:g('tel1'),tel2:g('tel2'),localidad:g('localidad'),zona:g('zona'),direccion:g('direccion'),pisodepto:g('pisodepto'),flete:g('flete'),estado:g('estado')||'Pendiente de asignar chofer',total:moneyParse(g('total')),pagos:moneyParse(g('pagos')),costo_flete:moneyParse(g('costo_flete')),instalacion:moneyParse(g('instalacion')),lineas:strToMuebles(g('muebles')),retiroLocal:g('retiroLocal'),localDestino:g('localDestino'),provincia:g('provincia'),dniCuit:g('dniCuit'),bultos:+g('bultos')||0,valorDeclarado:moneyParse(g('valorDeclarado')),escalera:0};
    o.pagosList=[o.pagos];const errs=[];
    if(!o.boleta)errs.push('sin N°');
    if(!/^\d{4}-\d{2}-\d{2}$/.test(o.fecha))errs.push('fecha inválida');
    if(o.tipo!=='Movimiento Interno'&&!o.cliente)errs.push('sin cliente');
    return {o,errs}});
  _importRows=parsed;

  document.body.insertAdjacentHTML('beforeend',`<div id="impOv" class="impov"><div class="impbox"><h3 style="margin:0 0 4px;color:#16324f">Previsualización de importación</h3><p class="muted" style="margin:0 0 12px">${parsed.length} filas · <b style="color:#15803d">${ok} listas</b>${bad?` · <b style="color:#b42318">${bad} con error (no se importan)</b>`:''}</p><div class="table-wrap" style="max-height:44vh;overflow:auto"><table><thead><tr><th>N°</th><th>Fecha</th><th>Tipo</th><th>Cliente</th><th>Total</th><th>Problema</th></tr></thead><tbody>${rowsH}</tbody></table></div><div class="row-actions" style="margin-top:14px;justify-content:flex-end"><button class="btn btn-ghost" onclick="cerrarImport()">Cancelar</button><button class="btn btn-ok" onclick="confirmarImport()" ${ok?'':'disabled'}>Importar ${ok} órdenes</button></div></div></div>`)}

let statMonth=HOY.slice(0,7);
function statPrevMonth(ym){const p=ym.split('-').map(Number);const d=new Date(p[0],p[1]-2,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function enMes(o,ym){return String(o.fecha).slice(0,7)===ym}
function esEntregada(o){return o.estado==='Entregado'||o.estado==='Cerrado'}
function vStats(){
  const ym=statMonth,ymPrev=statPrevMonth(ym);
  const mn=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const pp=ym.split('-');const mesNom=mn[+pp[1]]+' '+pp[0];
  const entregadas=ordenes.filter(o=>esEntregada(o)&&enMes(o,ym));
  const entMes=entregadas.length;
  const entPrev=ordenes.filter(o=>esEntregada(o)&&enMes(o,ymPrev)).length;
  const semana=semanaDe(HOY);const entSem=ordenes.filter(o=>esEntregada(o)&&semana.includes(o.fecha)).length;
  const dset=new Set(entregadas.map(o=>o.fecha));const prom=dset.size?Math.round(entMes/dset.size*10)/10:0;
  const reclamos=ordenes.filter(o=>o.reclamoNota&&enMes(o,ym)).length;
  const recPrev=ordenes.filter(o=>o.reclamoNota&&enMes(o,ymPrev)).length;
  const tasaRec=entMes?Math.round(reclamos/entMes*100):0;
  const probs=ordenes.filter(o=>enMes(o,ym)&&o.lineas.some(l=>l.sep==='problema')).length;
  const byF={};entregadas.filter(o=>o.flete).forEach(o=>byF[o.flete]=(byF[o.flete]||0)+1);
  const byZ={};entregadas.filter(o=>o.zona&&o.zona!=='Retiro'&&o.zona!=='Expreso'&&o.zona!=='Mov. interno').forEach(o=>byZ[o.zona]=(byZ[o.zona]||0)+1);
  const byT={};ordenes.filter(o=>enMes(o,ym)&&o.estado!=='Cancelado').forEach(o=>byT[o.tipo]=(byT[o.tipo]||0)+1);
  const bars=(obj,color)=>{const arr=Object.entries(obj).sort((a,b)=>b[1]-a[1]);if(!arr.length)return '<div class="empty">Sin datos en el período.</div>';const max=Math.max(...arr.map(x=>x[1]));return '<div class="zdist">'+arr.map(([k,n])=>`<div class="zrow" style="cursor:default"><div class="zname">${esc(k)}</div><div class="zbar"><div class="zfill" style="width:${Math.max(6,Math.round(n/max*100))}%${color?';background:'+color:''}"></div></div><div class="zn">${n}</div></div>`).join('')+'</div>'};
  const delta=(c,pv)=>{if(!pv)return c?'<span style="color:#15803d">nuevo</span>':'<span class="muted">—</span>';const d=Math.round((c-pv)/pv*100);return `<span style="color:${d>=0?'#15803d':'#b42318'};font-weight:700">${d>=0?'▲':'▼'} ${Math.abs(d)}%</span>`};
  $('view').innerHTML=`<div class="card"><div class="section-title"><h2>Estadísticas</h2><div class="row-actions"><button class="btn btn-ghost btn-sm" onclick="statMonth=statPrevMonth(statMonth);vStats()">‹ Mes anterior</button><button class="btn btn-ghost btn-sm" onclick="statMonth=HOY.slice(0,7);vStats()">Mes actual</button></div></div><div class="muted" style="margin:-2px 0 12px">${mesNom}</div>
  <div class="cdtot">
    <div class="stat"><div class="muted">Entregas del mes</div><div class="value">${entMes}</div><div style="font-size:12px">vs anterior: ${delta(entMes,entPrev)}</div></div>
    <div class="stat"><div class="muted">Entregas de la semana</div><div class="value">${entSem}</div></div>
    <div class="stat"><div class="muted">Promedio por día</div><div class="value">${prom}</div></div>
    <div class="stat" style="${reclamos?'background:#fdecea':''}"><div style="font-size:13px;font-weight:700;color:${reclamos?'#b42318':'#8a94a3'}">Reclamos</div><div class="value" style="color:${reclamos?'#b42318':'#0f1a2a'}">${reclamos}</div><div style="font-size:12px" class="muted">${tasaRec}% de entregas</div></div>
    <div class="stat"><div class="muted">Problemas depósito</div><div class="value">${probs}</div></div>
  </div></div>
  <div class="card"><h3>Entregas por flete</h3>${bars(byF)}</div>
  <div class="card"><h3>Entregas por zona</h3>${bars(byZ)}</div>
  <div class="card"><h3>Por tipo de envío</h3>${bars(byT,'#8a94a3')}</div>
  <div class="card"><h3>Comparación mensual</h3><div class="table-wrap"><table><thead><tr><th>Métrica</th><th>${mesNom}</th><th>Mes anterior</th><th>Variación</th></tr></thead><tbody>
    <tr><td>Entregas</td><td><b>${entMes}</b></td><td>${entPrev}</td><td>${delta(entMes,entPrev)}</td></tr>
    <tr><td>Reclamos</td><td><b>${reclamos}</b></td><td>${recPrev}</td><td>${delta(reclamos,recPrev)}</td></tr>
    <tr><td>Promedio diario</td><td><b>${prom}</b></td><td>—</td><td></td></tr>
  </tbody></table></div><p class="muted" style="margin-top:8px">Con historial cargado en Supabase vas a poder comparar mes a mes y año a año.</p></div>`;
}

/* CARGAR wizard */
let draft=null;
function nuevoDraft(){return {paso:1,boleta:'',fecha:HOY,tipo:'Envío',horaDesde:'12',horaHasta:'19',cliente:'',tel1:'',tel2:'',localidad:'',domicilio:'',pisodepto:'',retiroLocal:'2020',localDestino:'2299',expresoModo:'flete',transNombre:'',transTel:'',transDom:'',provincia:'',dniCuit:'',bultos:1,valorDeclarado:0,embalaje:0,cantMuebles:1,lineas:[{cant:1,desc:'',local:'2020'}],total:0,pagosList:[''],costo_flete:0,instalacion:0,escalera:0}}
function draftFromOrden(o){const hd=horaDef(o.tipo);let hD=hd[0],hH=hd[1];if(o.horario){const mm=String(o.horario).match(/(\d+)\D+(\d+)/);if(mm){hD=mm[1];hH=mm[2]}}return {paso:1,boleta:o.boleta,fecha:o.fecha,tipo:o.tipo,horaDesde:hD,horaHasta:hH,cliente:o.cliente,tel1:o.tel1||'',tel2:o.tel2||'',localidad:o.localidad,domicilio:o.direccion,pisodepto:o.pisodepto||'',retiroLocal:retLoc(o),localDestino:o.localDestino||'2299',expresoModo:o.expresoModo||'flete',transNombre:o.transNombre||'',transTel:o.transTel||'',transDom:o.transDom||'',provincia:o.provincia||'',dniCuit:o.dniCuit||'',bultos:o.bultos||1,valorDeclarado:o.valorDeclarado||0,embalaje:o.embalaje||0,cantMuebles:sum(o.lineas.map(l=>l.cant)),lineas:o.lineas.map(l=>({...l})),total:o.tipo==='Expreso'?(o.compra!=null?o.compra:((o.total||0)-(o.embalaje||0)-(o.costo_flete||0))):o.total,pagosList:o.pagosList||[o.pagos],costo_flete:o.costo_flete,instalacion:o.instalacion,escalera:o.escalera}}
function zonaDraft(){return locData(draft.localidad).zona||'—'}
function readStep(){const p=draft.paso;
  if(p===1){if($('w_bol'))draft.boleta=$('w_bol').value.trim();if($('w_fec'))draft.fecha=$('w_fec').value;if($('w_tipo'))draft.tipo=$('w_tipo').value;if($('w_hd'))draft.horaDesde=$('w_hd').value.trim();if($('w_hh'))draft.horaHasta=$('w_hh').value.trim()}
  if(p===2){if($('w_cli'))draft.cliente=$('w_cli').value.trim();if($('w_t1'))draft.tel1=$('w_t1').value.trim();if($('w_t2'))draft.tel2=$('w_t2').value.trim();if($('w_loc'))draft.localidad=$('w_loc').value.trim();if($('w_dom'))draft.domicilio=$('w_dom').value.trim();if($('w_pisodepto'))draft.pisodepto=$('w_pisodepto').value.trim();if($('w_ret'))draft.retiroLocal=$('w_ret').value;if($('w_dest'))draft.localDestino=$('w_dest').value;if($('w_emodo'))draft.expresoModo=$('w_emodo').value;if($('w_tn'))draft.transNombre=$('w_tn').value.trim();if($('w_tt'))draft.transTel=$('w_tt').value.trim();if($('w_tdom'))draft.transDom=$('w_tdom').value.trim();if($('w_prov'))draft.provincia=$('w_prov').value.trim();if($('w_dni'))draft.dniCuit=$('w_dni').value.trim()}
  if(p===3){if($('w_cant'))draft.cantMuebles=+$('w_cant').value||0;if($('w_bultos'))draft.bultos=+$('w_bultos').value||0;const rows=document.querySelectorAll('#w_muebles .mueble-row');if(rows.length)draft.lineas=[...rows].map(r=>({cant:+r.querySelector('.m_cant').value||1,desc:r.querySelector('.m_desc').value.trim(),local:r.querySelector('.m_loc').value}))}
  if(p===4){if($('w_total'))draft.total=moneyParse($('w_total').value);const pv=document.querySelectorAll('#w_pagos .p_val');if(pv.length)draft.pagosList=[...pv].map(x=>moneyParse(x.value));if($('w_cflete'))draft.costo_flete=moneyParse($('w_cflete').value);if($('w_emb'))draft.embalaje=moneyParse($('w_emb').value);if($('w_inst'))draft.instalacion=moneyParse($('w_inst').value);if($('w_vdec'))draft.valorDeclarado=moneyParse($('w_vdec').value)}
}
function faltan(){const p=draft.paso;const m=[];const k=[];const t=draft.tipo;
  if(p===1){if(!draft.boleta){m.push('N° de orden');k.push('boleta')}if(!draft.fecha){m.push('Día de entrega');k.push('fecha')}if(!draft.tipo){m.push('Tipo de envío');k.push('tipo')}if(!draft.horaDesde||!draft.horaHasta){m.push('Horario');k.push('hora')}}
  if(p===2){if(t==='Movimiento Interno'){if(!draft.localDestino){m.push('Local de destino');k.push('dest')}}else if(t==='Retiro'){if(!draft.cliente){m.push('Nombre del cliente');k.push('cliente')}if(!draft.tel1){m.push('Teléfono 1');k.push('tel1')}}else{if(!draft.cliente){m.push('Nombre del cliente');k.push('cliente')}if(!draft.tel1){m.push('Teléfono 1');k.push('tel1')}if(t==='Expreso'){if(!draft.transNombre){m.push('Nombre del transporte');k.push('tn')}if(!draft.provincia){m.push('Provincia');k.push('prov')}if(!draft.dniCuit){m.push('DNI / CUIT');k.push('dni')}if(!draft.localidad){m.push('Localidad');k.push('localidad')}}else if(!draft.domicilio){m.push('Domicilio');k.push('domicilio')}if(!draft.localidad){m.push('Localidad');k.push('localidad')}}}
  if(p===3){const s=sum(draft.lineas.map(l=>l.cant));if(!draft.cantMuebles){m.push('Cantidad de muebles');k.push('cantMuebles')}if(draft.lineas.some(l=>!l.desc)){m.push('Descripción de cada mueble');k.push('desc')}if(draft.cantMuebles&&s!==+draft.cantMuebles){m.push('Las cantidades suman '+s+' y tienen que dar '+draft.cantMuebles);k.push('cuadra')}}
  return {m,k}}
function invc(key){return draft._inval&&draft._inval.includes(key)?' inval':''}
function goStep(p){readStep();if(p>draft.paso){const f=faltan();if(f.k.length){draft._inval=f.k;vCargar();return}}draft._inval=[];draft.paso=p;vCargar()}
function setTipo(v){readStep();draft.tipo=v;const hd=horaDef(v);draft.horaDesde=hd[0];draft.horaHasta=hd[1];vCargar()}

put id="w_dom" value="${esc(draft.domicilio)}" placeholder="Calle y número"></label><label class="field"><span class="lbl">Piso / Depto</span><input id="w_pisodepto" value="${esc(draft.pisodepto)}" placeholder="Ej: 5° B"></label></div>`;

  }

    body=`<div class="sub-h">Muebles</div><div class="form-grid"><label class="field"><span class="lbl">¿Cuántos muebles en total?</span><input type="number" min="1" id="w_cant" class="${invc('cantMuebles').trim()}" value="${draft.cantMuebles}" oninput="readStep();updCuadra()"></label>${t==='Expreso'?`<label class="field"><span class="lbl">Cantidad de bultos</span><input type="number" min="1" id="w_bultos" value="${draft.bultos}"></label>`:''}</div>

      else body+=`<p class="muted" style="margin-top:12px">Retiro en el local — sin costo de envío ni instalación.</p>`;
    }
  }
  const nav=`${draft._inval&&draft._inval.length?`<div class="missing">Completá lo que quedó en rojo para poder avanzar.</div>`:''}<div class="wiz-nav"><button class="btn btn-ghost" ${P===1?'disabled':''} onclick="goStep(${P-1})">← Atrás</button>${P<4?`<button class="btn btn-primary" onclick="goStep(${P+1})">Siguiente →</button>`:`<button class="btn btn-ok" onclick="guardarDraft()">✓ Guardar orden</button>`}</div>`;
  $('view').innerHTML=`<div class="card"><h2>${editId?'Editar orden':'Cargar orden'}</h2><div class="steps">${pill(1,'Orden')}${pill(2,'Cliente')}${pill(3,'Muebles')}${pill(4,'Saldos')}</div>${body}${nav}</div>`;
}
function mrow(l){const dinv=(draft._inval&&draft._inval.includes('desc')&&!l.desc)?' inval':'';return `<div class="mueble-row"><label class="field"><span class="lbl">Cant.</span><input type="number" min="1" class="m_cant" value="${l.cant||1}" oninput="readStep();updCuadra()"></label><label class="field"><span class="lbl">Mueble</span><input class="m_desc${dinv}" value="${esc(l.desc||'')}" placeholder="Cómoda Detroit 120 blanca"></label><label class="field"><span class="lbl">Sale de</span><select class="m_loc">${opts(LOCALES,l.local||'2020')}</select></label><button type="button" class="btn btn-danger btn-sm" style="height:42px" onclick="delMueble(this)">×</button></div>`}
function updCuadra(){const ind=$('cuadraInd');if(!ind)return;const s=sum([...document.querySelectorAll('#w_muebles .m_cant')].map(x=>x.value));const n=+$('w_cant').value||0;const ok=n===s;ind.className='cuadra '+(ok?'ok':'no');ind.textContent=ok?`Las cantidades cuadran (${s} de ${n})`:`Cargá hasta sumar ${n} — vas ${s}`}
function delMueble(b){readStep();const i=[...document.querySelectorAll('#w_muebles .mueble-row')].indexOf(b.closest('.mueble-row'));draft.lineas.splice(i,1);if(!draft.lineas.length)draft.lineas.push({cant:1,desc:'',local:'2020'});vCargar()}
function pagoRow(p,i){return `<div class="pagorow${i>0?' del':''}"><input type="text" inputmode="numeric" class="p_val" value="${p?moneyFmt(p):''}" placeholder="Monto del pago ${i+1}" oninput="moneyIn(this);refreshSaldo()">${i>0?`<button type="button" class="btn btn-danger btn-sm" onclick="delPago(${i})">×</button>`:''}</div>`}
function delPago(i){readStep();draft.pagosList.splice(i,1);vCargar()}
function refreshSaldo(){if($('w_saldo'))$('w_saldo').textContent=money(moneyParse($('w_total').value)-sum([...document.querySelectorAll('.p_val')].map(x=>moneyParse(x.value))))}
function addTipo(){const t=prompt('Nuevo tipo de envío:');if(t&&!TIPOS.includes(t)){TIPOS.push(t);readStep();draft.tipo=t;vCargar()}}
function expSaldo(){return (+draft.total||0)+(+draft.embalaje||0)+(+draft.costo_flete||0)-sum(draft.pagosList)}
function expSaldoHTML(){const s=expSaldo();return `<span>Saldo pendiente (debe ser $0)</span><span style="color:${s===0?'#15803d':'#b42318'}">${money(s)}</span>`}
function refreshExp(){const el=$('w_expsaldo');if(el)el.innerHTML=expSaldoHTML()}
function guardarDraft(){readStep();const t=draft.tipo;
  if(diasCerrados[draft.fecha]){alert('Ese día está cerrado para programar. Reabrilo en Órdenes o elegí otro día.');return}
  const esRetiro=t==='Retiro';const esMI=t==='Movimiento Interno';const esExp=t==='Expreso';
  const saldo=draft.total-sum(draft.pagosList);
  if(!esMI&&!esExp&&(saldo<0||saldo>500000)){if(!confirm('AUTORIZACIÓN\n\nEl saldo es '+money(saldo)+(saldo<0?' (NEGATIVO)':' (mayor a $500.000)')+'.\nRequiere autorización.\n\n¿Confirmás que está correcto?'))return}
  if(esExp&&!draft.valorDeclarado){if(!confirm('No cargaste el valor declarado del expreso. ¿Guardar igual?'))return}
  let habil=true,condMotivo='';if(esExp){const se=expSaldo();if(se!==0){condMotivo=prompt('El saldo del expreso no cierra en $0 (queda '+money(se)+'). Todo tiene que estar pago para sacarlo.\n\n¿Por qué lo autorizás igual? (queda registrado y la orden entra CONDICIONADA)');if(condMotivo===null)return;habil=false}}
  const horario=draft.horaDesde+' a '+draft.horaHasta+'hs';
  const direccion=esRetiro?('Retira en '+draft.retiroLocal):(esMI?('Destino: '+draft.localDestino):draft.domicilio);
  const zona=esRetiro?'Retiro':(esMI?'Mov. interno':(esExp?'Expreso':zonaDraft()));
  const reg={boleta:draft.boleta,fecha:draft.fecha,tipo:t,horario,cliente:draft.cliente,tel1:draft.tel1,tel2:draft.tel2,localidad:(esRetiro||esMI)?'':draft.localidad,provincia:esExp?draft.provincia:'',zona,direccion,pisodepto:draft.pisodepto,retiroLocal:(esRetiro||(esExp&&draft.expresoModo==='retira'))?draft.retiroLocal:'',localDestino:esMI?draft.localDestino:'',expresoModo:esExp?draft.expresoModo:'',transNombre:esExp?draft.transNombre:'',transTel:esExp?draft.transTel:'',transDom:esExp?draft.transDom:'',dniCuit:esExp?draft.dniCuit:'',bultos:esExp?draft.bultos:0,valorDeclarado:esExp?draft.valorDeclarado:0,lineas:draft.lineas.filter(m=>m.desc),total:esMI?0:draft.total,pagosList:draft.pagosList,pagos:esMI?0:sum(draft.pagosList),costo_flete:(esRetiro||esMI)?0:draft.costo_flete,embalaje:esExp?draft.embalaje:0,instalacion:(esRetiro||esMI||esExp)?0:draft.instalacion,escalera:draft.escalera};
  if(esExp){reg.habilitada=habil;reg.condMotivo=condMotivo;reg.compra=draft.total;reg.total=(+draft.total||0)+(+draft.embalaje||0)+(+draft.costo_flete||0)}
  const necesitaChofer=!(esRetiro||esMI||(esExp&&draft.expresoModo==='retira'));
  if(editId){const o=ordenes.find(x=>x.id===editId);Object.assign(o,reg);if(o.estado==='Por completar')o.estado=(o.flete?'Pendiente de entrega':'Pendiente de asignar chofer')}
  else ordenes.push(Object.assign({id:nid(),estado:necesitaChofer?'Pendiente de asignar chofer':'Pendiente de entrega',verificado:false,flete:''},reg));
  draft=null;editId=null;alert('Orden guardada. Mirá el Mapa y las Órdenes.');setTab('ordenes')}

/* ÓRDENES */
let ordFil={q:'',estado:'',flete:''};
let ordCond=false;let ordZona='';let ordProb=false;let ordRet='';let ordTipo='';
function irOrdenes(o){o=o||{};selDay=o.day||HOY;weekRef=o.day||HOY;ordMacro=o.macro||'proceso';ordFil={q:'',estado:o.estado||'',flete:o.flete||''};ordCond=!!o.cond;ordZona=o.zona||'';ordProb=!!o.prob;ordRet=o.ret||'';ordTipo=o.tipo||'';setTab('ordenes')}
let ordMacro='proceso';
let weekRef=HOY;
let selDay=HOY;
let diasCerrados={};
const ESTADOS=['Por completar','Pendiente de asignar chofer','Pendiente de entrega','En viaje','Entregado','Cerrado','En reclamo','Reprogramado','Cancelado'];
const DIASSEM=['Lun','Mar','Mié','Jue','Vie','Sáb'];
const DOW=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function proxDias(desde,n){const a=[];let d=new Date(desde+'T00:00');while(a.length<n){if(d.getDay()!==0)a.push(isoOf(d));d.setDate(d.getDate()+1)}return a}
function isoOf(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function addDays(iso,n){const d=new Date(iso+'T00:00');d.setDate(d.getDate()+n);return isoOf(d)}
function semanaDe(ref){const d=new Date(ref+'T00:00');const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);const a=[];for(let i=0;i<6;i++){const x=new Date(d);x.setDate(d.getDate()+i);a.push(isoOf(x))}return a}
function esProceso(o){return o.estado!=='Cerrado'&&o.estado!=='Cancelado'}
function reOrd(k){vOrdenes();if(k){const el=$('of_q');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}}}
function asignarFlete(id,v){const o=ordenes.find(x=>x.id===id);o.flete=v;if(v){if(o.estado==='Pendiente de asignar chofer')o.estado='Pendiente de entrega'}else{if(o.estado==='Pendiente de entrega')o.estado='Pendiente de asignar chofer'}vOrdenes()}
let MOTIVOS_BH=['Envío bonificado','Ayudante extra','Peaje','Espera del chofer','Otros motivos'];

function cerrarOrden(id){const o=ordenes.find(x=>x.id===id);const saldo=(o.total||0)-(o.pagos||0);
  const cob=prompt('¿Cuánto cobró el chofer por esta orden?\n(Tenía que cobrar '+money(saldo)+')',saldo);if(cob===null)return;const cobN=moneyParse(cob);
  let cmot='';if(cobN<saldo){cmot=prompt('Cobró '+money(saldo-cobN)+' menos de lo que decía la orden. ¿Por qué?','')||''}
  const bh=prompt('¿Belgrano Home le pagó algo adicional al chofer por su trabajo?\n(0 si no hay)',0);if(bh===null)return;const bhN=moneyParse(bh);
  let bmot='';if(bhN>0)bmot=elegirMotivoBH();
  o.cobrado=cobN;o.cobradoMenosMotivo=cmot;o.seLleva=(o.costo_flete||0)+(o.instalacion||0);o.bhPago=bhN;o.bhPagoMotivo=bmot;o.rendido=false;o.estadoPrev=o.estado;o.estado='Cerrado';vOrdenes()}
function reabrirOrden(id){const o=ordenes.find(x=>x.id===id);o.estado=o.estadoPrev||(o.flete?'En viaje':'Pendiente de asignar chofer');o.rendido=false;vOrdenes()}
function cerrarFlete(f){const n=ordenes.filter(o=>o.fecha===selDay&&o.flete===f&&(o.estado==='En viaje'||o.estado==='Entregado'));if(!n.length){alert('Ese flete no tiene viajes para cerrar (en viaje o entregados) en el día.');return}n.forEach(o=>{o.estadoPrev=o.estado;o.estado='Cerrado'});vOrdenes()}
function toggleDiaCerrado(){if(diasCerrados[selDay])delete diasCerrados[selDay];else diasCerrados[selDay]=true;vOrdenes()}
function marcarHabil(id,val){const o=ordenes.find(x=>x.id===id);if(val){const pg=prompt('El cliente vino a pagar. ¿Cuánto pagó ahora? (0 = solo habilitar)',0);if(pg===null)return;const pn=moneyParse(pg);if(pn>0){o.pagosList=(o.pagosList||[]).concat(pn);o.pagos=(o.pagos||0)+pn}o.habilitada=true}else{o.habilitada=false}vOrdenes()}

/* ============ ORDENES ============ */
function vOrdenes(){
  const dias=semanaDe(weekRef);
  if(!dias.includes(selDay))selDay=dias.includes(HOY)?HOY:dias[0];
  const tabsH=dias.map((iso,i)=>{const n=ordenes.filter(o=>o.fecha===iso&&o.estado!=='Cancelado').length;const cerr=diasCerrados[iso];const p=iso.split('-');
    return `<button class="daypill${iso===selDay?' sel':''}${cerr?' cerr':''}" onclick="selDay='${iso}';vOrdenes()"><span class="dn">${DIASSEM[i]} ${+p[2]}/${+p[1]}</span><span class="dc">${cerr?'cerrado · ':''}${n} viaje${n===1?'':'s'}</span></button>`}).join('');
  const dayO=ordenes.filter(o=>o.fecha===selDay&&o.estado!=='Cancelado');
  const total=dayO.length;const sinAsig=dayO.filter(o=>!o.flete).length;const condic=dayO.filter(o=>o.habilitada===false).length;const firmes=total-condic;
  const porF={};dayO.filter(o=>o.flete).forEach(o=>porF[o.flete]=(porF[o.flete]||0)+1);
  const chips=Object.entries(porF).sort((a,b)=>b[1]-a[1]).map(([f,n])=>`<span class="chchip">${esc(f)} · <b>${n}</b> <button class="minibtn" onclick="cerrarFlete('${esc(f)}')">Cerrar</button></span>`).join('');
  const cerrado=diasCerrados[selDay];
  const meta=firmes>=15?'<span class="tgt ok">día completo</span>':`<span class="tgt">${firmes}/~15</span>`;
  const scope=ordCond?semanaDe(weekRef):[selDay];let list=ordenes.filter(o=>scope.includes(o.fecha));if(ordCond)list=list.filter(o=>o.habilitada===false);if(ordZona)list=list.filter(o=>o.zona===ordZona);if(ordProb)list=list.filter(o=>o.lineas.some(l=>l.sep==='problema'));if(ordRet)list=list.filter(o=>o.tipo==='Retiro'&&(ordRet==='ALL'||retLoc(o)===ordRet));if(ordTipo)list=list.filter(o=>o.tipo===ordTipo);
  if(ordFil.estado){list=list.filter(o=>o.estado===ordFil.estado)}else{list=list.filter(o=>ordMacro==='proceso'?esProceso(o):o.estado==='Cerrado')}
  if(ordFil.q)list=list.filter(o=>String(o.boleta).toLowerCase().includes(ordFil.q.toLowerCase()));
  if(ordFil.estado)list=list.filter(o=>o.estado===ordFil.estado);
  if(ordFil.flete)list=list.filter(o=>ordFil.flete==='__sin'?!o.flete:o.flete===ordFil.flete);
  _ordList=list;const rows=list.map(o=>{const nm=sum(o.lineas.map(l=>l.cant));const prob=o.lineas.some(l=>l.sep==='problema');
    const fopts=['<option value="">Sin asignar</option>'].concat(FLETES.map(f=>`<option ${o.flete===f?'selected':''}>${esc(f)}</option>`)).join('');
    const hor=o.horario==='Estándar'?'<span class="muted">Estándar</span>':`<b>${esc(o.horario||'—')}</b>`;
    const acc=[`<button class="btn btn-ghost btn-sm" onclick="verImprimir(${o.id})">Remito</button>`];
    if(ordMacro==='proceso'){if(prob){acc.push(`<button class="btn btn-danger btn-sm" onclick="resolverProblema(${o.id})">Resolver depósito</button>`)}else if(o.habilitada===false){acc.push(`<button class="btn btn-ok btn-sm" onclick="marcarHabil(${o.id},true)">Habilitar</button>`)}else{if(o.estado==='Pendiente de entrega')acc.push(`<button class="btn btn-ok btn-sm" onclick="despachar(${o.id})">Despachar</button>`);if(o.estado==='En viaje'||o.estado==='Entregado')acc.push(`<button class="btn btn-primary btn-sm" onclick="cerrarOrden(${o.id})">Cerrar</button>`);if(o.estado==='Pendiente de asignar chofer'||o.estado==='Pendiente de entrega')acc.push(`<button class="btn btn-ghost btn-sm" onclick="marcarHabil(${o.id},false)">No habilitar</button>`)}}
    else{acc.push(`<button class="btn btn-ghost btn-sm" onclick="reabrirOrden(${o.id})">Reabrir</button>`)}
    if(o.estado==='En reclamo')acc.push(`<button class="btn btn-ghost btn-sm" onclick="verReclamo(${o.id})">Ver reclamo</button>`);if(ordMacro==='proceso')acc.push(`<button class="btn btn-danger btn-sm" onclick="cancelarOrden(${o.id})">Cancelar</button>`);acc.push(`<button class="btn btn-ghost btn-sm" onclick="editId=${o.id};draft=null;setTab('cargar')">Editar</button>`);
    return `<tr class="${!o.flete?'sinasignar':''}"><td><strong>${esc(o.boleta)}</strong>${o.verificado?' ✓':''}<br><span class="muted">${esc(o.cliente||'')}</span></td><td>${esc(o.localidad||'—')}<br><span class="muted">${esc(o.zona||'')}</span></td><td style="text-align:center">${nm}</td><td><select class="fletesel" onchange="asignarFlete(${o.id},this.value)">${fopts}</select></td><td>${hor}</td><td><b>${money((o.total||0)-(o.pagos||0))}</b><br><span class="muted">Env ${money(o.costo_flete||0)}</span></td><td><span class="badge ${estClass(o.estado)}">${esc(o.estado)}</span>${prob?' <span class="badge e-prob">Revisar depósito</span>':''}${o.habilitada===false?' <span class="badge e-cond">No habilitada</span>':''}</td><td><div class="row-actions" style="justify-content:flex-end">${acc.join('')}</div></td></tr>`}).join('');
  $('view').innerHTML=`<div class="card"><div class="section-title"><h2>Órdenes</h2><div class="row-actions"><button class="btn btn-ghost btn-sm" onclick="weekRef=addDays(weekRef,-7);vOrdenes()">← Semana</button><button class="btn btn-ghost btn-sm" onclick="weekRef=addDays(weekRef,7);vOrdenes()">Semana →</button>${esAdmin()?'<button class="btn btn-ghost btn-sm" onclick="exportarOrdenes()">Descargar CSV</button><button class="btn btn-ghost btn-sm" onclick=\'$(&quot;impFile&quot;).click()\'>Importar CSV</button><button class="btn btn-ghost btn-sm" onclick="plantillaCSV()">Plantilla</button><input type="file" id="impFile" accept=".csv" style="display:none" onchange="importarArchivo(this)">':''}</div></div>
    <div class="daytabs">${tabsH}</div>
    <div class="daybar"><div><b>${fmt(selDay)}</b> · ${total} coordinado${total===1?'':'s'} ${meta}${condic?` · <span class="cond">${condic} condicional${condic===1?'':'es'}</span>`:''}${sinAsig?` · <span class="sinred">${sinAsig} sin chofer</span>`:''}</div><button class="btn ${cerrado?'btn-danger':'btn-primary'} btn-sm" onclick="toggleDiaCerrado()">${cerrado?'Reabrir el día':'Cerrar el día'}</button></div>
    ${cerrado?'<div class="daylock">Día cerrado — no se pueden programar más viajes.</div>':''}

  const groups={};items.forEach(it=>{const k=cdGroup==='flete'?(it.o.flete||'__SIN'):(cdGroup==='boleta'?it.o.boleta:(cdGroup==='tipo'?(it.o.tipo==='Movimiento Interno'?'Mov. interno':it.o.tipo):it.l.desc));(groups[k]=groups[k]||[]).push(it)});
  const keys=Object.keys(groups).sort((a,b)=>a==='__SIN'?1:(b==='__SIN'?-1:a.localeCompare(b)));

function vRuta(){const list=ordenes.filter(o=>o.fecha===HOY&&o.flete===fleteActual&&o.estado!=='Cancelado');if(!list.length){$('view').innerHTML='<div class="card"><div class="empty">No tenés viajes hoy.</div></div>';return}
  const cards=list.map(o=>{const m=o.lineas.map(l=>`<li>${l.cant} × ${esc(l.desc)}</li>`).join('');const cobro=(o.total-o.pagos)+o.costo_flete+peajeDe(o)+o.instalacion+o.escalera;const dir=esc(o.direccion)+(o.pisodepto?' · '+esc(o.pisodepto):'');
    return `<div class="flete-card"><div class="section-title"><h3>${esc(o.cliente)}</h3><span class="badge ${estClass(o.estado)}">${esc(o.estado)}</span></div><div class="muted">${dir} · ${esc(o.localidad)} · ${esc(o.horario)}</div><ul style="margin:8px 0 0;padding-left:18px">${m}</ul><div style="margin-top:6px"><b>A cobrar: ${money(cobro)}</b></div>${o.estado==='En reclamo'?`<div class="probnote" style="margin:8px 0">Problema: ${esc(o.reclamoNota||'(sin nota)')}${o.reclamoFoto?`<br><img src="${o.reclamoFoto}" style="max-width:150px;border-radius:6px;margin-top:6px">`:''}</div>`:''}${reclamoOpen===o.id?`<div class="reclform"><textarea id="t_reclamo" placeholder="Contá qué pasó: cliente no estaba, no entró el mueble, vino roto…">${esc(o.reclamoNota||'')}</textarea><div class="row-actions"><label class="btn btn-ghost btn-sm" style="cursor:pointer">Adjuntar foto<input type="file" accept="image/*" capture="environment" style="display:none" onchange="onReclamoFoto(this)"></label><span id="fotoPrev"></span></div><div class="row-actions" style="margin-top:8px"><button class="btn btn-danger btn-sm" onclick="enviarReclamo(${o.id})">Enviar problema</button><button class="btn btn-ghost btn-sm" onclick="reclamoOpen=null;reclamoFotoTmp='';render()">Cancelar</button></div></div>`:`<div class="row-actions" style="margin-top:11px"><a class="btn btn-ghost btn-sm" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(o.direccion)}" target="_blank">Maps</a>${o.estado==='En viaje'?`<button class="btn btn-ok btn-sm" onclick="ordenes.find(x=>x.id===${o.id}).estado='Entregado';render()">Entregado</button><button class="btn btn-danger btn-sm" onclick="fleteProblema(${o.id})">Problema</button>`:''}</div>`}</div>`}).join('');
  $('view').innerHTML=`<div class="card"><div class="section-title"><h2>Mi ruta · ${fmt(HOY)}</h2><span class="muted">${list.length} viajes</span></div></div>${cards}`}

function onLocInput(){draft.localidad=$('w_loc').value.trim();const z=locData(draft.localidad).zona||'—';if($('w_zona'))$('w_zona').textContent=z}
function refreshCostos(){if($('w_costos'))$('w_costos').textContent=money(moneyParse($('w_cflete').value)+moneyParse($('w_inst').value))}
function vConfig(){const chips=(arr,fn)=>arr.length?arr.map((v,i)=>`<span class="chip">${esc(v)} <button onclick="${fn}(${i})">×</button></span>`).join(''):'<span class="muted">Sin valores.</span>';
  $('view').innerHTML=`<div class="card"><h2>Configuración</h2><p class="muted">Agregá o sacá los valores que usa la app. Los cambios se ven al instante en los desplegables de Cargar.</p></div>
  <div class="card"><h3>Tipos de envío</h3><div class="chips">${chips(TIPOS,'delTipo')}</div><div class="addrow"><input id="cfg_tipo" placeholder="Nuevo tipo de envío"><button class="btn btn-primary btn-sm" onclick="addCfg('tipo')">Agregar</button></div></div>
  <div class="card"><h3>Fletes</h3><div class="chips">${chips(FLETES,'delFlete')}</div><div class="addrow"><input id="cfg_flete" placeholder="Nuevo flete"><button class="btn btn-primary btn-sm" onclick="addCfg('flete')">Agregar</button></div></div>
  <div class="card"><h3>Locales de origen</h3><div class="chips">${chips(LOCALES,'delLocal')}</div><div class="addrow"><input id="cfg_local" placeholder="Nuevo local"><button class="btn btn-primary btn-sm" onclick="addCfg('local')">Agregar</button></div></div>
  <div class="card"><h3>Localidades</h3><p class="muted">Son ~170 (CABA + GBA), cada una con su zona. Las administramos en una pantalla aparte para no tocar el ruteo (próximo paso).</p></div>`}
function addCfg(k){const m={tipo:['cfg_tipo',TIPOS],flete:['cfg_flete',FLETES],local:['cfg_local',LOCALES]}[k];const v=$(m[0]).value.trim();if(v&&!m[1].includes(v))m[1].push(v);vConfig()}
function delTipo(i){TIPOS.splice(i,1);vConfig()}
function delFlete(i){FLETES.splice(i,1);vConfig()}
function delLocal(i){LOCALES.splice(i,1);vConfig()}
render();
</script>
</body>
</html>
